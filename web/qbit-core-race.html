function ftToggle(name){
  var el=$(ftPanels[name]);if(!el)return;
  ftActive[name]=!ftActive[name];
  el.style.display=ftActive[name]?'flex':'none';
  var btn=$('cr-'+name);if(btn)btn.style.borderColor=ftActive[name]?'#58a6ff':'#30363d';
  var anyOpen=Object.keys(ftActive).some(function(k){return ftActive[k]});
  var strip=$('ft-strip');
  if(strip){strip.className=anyOpen?'on':''}
}

function ftLog(panel,msg,color){
  var body=$('ftb-'+panel);if(!body||!ftActive[panel])return;
  var row=document.createElement('div');
  row.className='fterm-row';
  var ts=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  row.innerHTML='<span class="ft-lbl">'+ts+'</span> <span style="color:'+(color||'#c9d1d9')+'">'+msg+'</span>';
  body.appendChild(row);
  while(body.children.length>ftMaxLines[panel]) body.removeChild(body.firstChild);
  body.scrollTop=body.scrollHeight;
}

function ftClear(panel){var body=$('ftb-'+panel);if(body)body.innerHTML=''}

function ftGates(){
  ftClear('gates');

  gateStates.forEach(function(g,i){
    var open=Object.values(g.ports).filter(function(p){return p.state==='open'}).length;
    var filt=Object.values(g.ports).filter(function(p){return p.state==='filtered'}).length;
    var cls=Object.values(g.ports).filter(function(p){return p.state==='closed'}).length;
    var alertCol=g.alertLevel>5?'#f85149':g.alertLevel>2?'#ff8c38':'#3fb950';
    var alertSym=g.alertLevel>5?'🔴':g.alertLevel>2?'🟡':'🟢';
    ftLog('gates',alertSym+' <b>L'+i+'</b> '+g.name,alertCol);

  });
}

function ftQuantum(){
  try{
  ftClear('quantum');
  var cov=qLines>0?(qClassified/qLines*100).toFixed(1):'0.0';
  ftLog('quantum','<b>QUANTUM GUTTER</b> · '+qLang,'#e040fb');
  ftLog('quantum','Coverage: <b>'+cov+'%</b> ('+qClassified+'/'+qLines+' lines)','#c9d1d9');
  ftLog('quantum','─── PREFIX DISTRIBUTION ───','#484f58');
  var syms=['n:','+1:','-n:','+0:','0:','-1:','+n:','+2:','-0:','+3:','1:'];
  var maxC=1;syms.forEach(function(s){if((prefixCounts[s]||0)>maxC)maxC=prefixCounts[s]});
  syms.forEach(function(s){
    var c=prefixCounts[s]||0;if(c===0)return;
    var bar='';var len=Math.round(c/maxC*16);for(var b=0;b<len;b++)bar+='█';
    var gate=SYM_GATES[s]||'?';
    var label=(s+'    ').substring(0,4);
    ftLog('quantum','<span style="color:'+(SYM_COLORS[s]||'#484f58')+'">'+label+'</span> '+bar+' '+c+' <span style="color:#484f58">['+gate+']</span>',SYM_COLORS[s]||'#484f58');
  });
  ftLog('quantum','─── CONTRAIL ───','#484f58');
  if(contrailBuf.length>0){
    var html='<div class="contrail-bar">';
    contrailBuf.forEach(function(s){html+='<div class="contrail-seg" style="background:'+(SYM_COLORS[s]||'#21262d')+'"></div>'});
    html+='</div>';
    ftLog('quantum',html,'#8b949e');
    ftLog('quantum','Last '+contrailBuf.length+' classifications','#484f58');
  } else {ftLog('quantum','No data yet','#484f58')}
  ftLog('quantum','─── DAC ───','#484f58');
  var DAC=window.prefixDAC;
  if(DAC&&typeof DAC.dacStats==='function'){
    try{var ds=DAC.dacStats();
      ftLog('quantum','Calls: '+(ds.calls||dacCallCount)+' | Lines: '+(ds.lines||qLines)+' | LPS: '+(ds.lps||0).toFixed(0),'#a78bfa');
    }catch(e){ftLog('quantum','DAC: '+dacCallCount+' calls','#a78bfa')}
  } else {ftLog('quantum','DAC: '+dacCallCount+' classify calls','#a78bfa')}
  var mode='prefix';
  try{if(DAC&&typeof DAC.dacMode==='function')mode=DAC.dacMode()}catch(e){}
  ftLog('quantum','Mode: '+mode,'#8b949e');
  ftLog('quantum','─── STENO ───','#484f58');
  var QS=window.QbitSteno;
  if(QS){
    ftLog('quantum','Codec: 13 Unicode spaces · 19b/line','#56d4dd');
    ftLog('quantum','Lines encoded: '+stenoTotalLines+' | Bits: '+stenoTotalBits,'#56d4dd');
  } else {ftLog('quantum','qbit-steno.js not loaded','#484f58')}
  ftLog('quantum','─── GLUELAM ───','#484f58');
  ftLog('quantum','QP: '+(window.QuantumPrefixes?'<span class="ft-g">✓</span> 59 langs':'<span class="ft-r">✗</span>'),'#c9d1d9');
  ftLog('quantum','DAC: '+(DAC?'<span class="ft-g">✓</span> tracks+stripes':'<span class="ft-r">✗</span>'),'#c9d1d9');
  ftLog('quantum','Steno: '+(QS?'<span class="ft-g">✓</span> codec active':'<span class="ft-r">✗</span>'),'#c9d1d9');
  ftLog('quantum','Codec: '+(window.qbitCodec?'<span class="ft-g">✓</span> .qbit ready':'<span class="ft-r">✗</span>'),'#c9d1d9');
  ftLog('quantum','Gutter: '+(gutterMode?'<span class="ft-g">ON</span>':'<span class="ft-r">OFF</span>'),'#c9d1d9');
  }catch(err){console.warn('ftQuantum error:',err)}
}

function traceRoute(fromStation,toStation,cb){
  var hops=[];
  var layers=[0,1,2,3,4,5];
  var t0=performance.now();
  var hopIdx=0;
  function nextHop(){
    if(hopIdx>=layers.length*2){cb(hops);return}
    var li=hopIdx<layers.length?layers[hopIdx]:layers[layers.length*2-1-hopIdx];
    var gate=gateStates[Math.min(li,gateStates.length-1)];
    var phase=hopIdx<layers.length?'ascend':'descend';
    var latency=gate.jitter*(0.5+Math.random());
    var dropped=Math.random()<gate.denial;
    var denied=false;
    if(gate.alertLevel>3&&Math.random()<0.4) denied=true;
    setTimeout(function(){
      var hop={
        idx:hopIdx,layer:li,name:gate.name,phase:phase,
        ms:latency,ttl:64-hopIdx*4,
        dropped:dropped,denied:denied,
        firewall:gate.firewall,ids:gate.ids
      };
      hops.push(hop);
      var sym=dropped?'✗':denied?'⊘':'✓';
      var col=dropped?'#f85149':denied?'#ff8c38':'#3fb950';
      logMsg('  '+hopIdx+' '+sym+' '+gate.name+' '+latency.toFixed(1)+'ms ttl='+hop.ttl+' ['+gate.firewall+']',col);
      ftLog('comms',sym+' hop '+hopIdx+' '+gate.name+' '+latency.toFixed(1)+'ms ['+phase+']',col);
      ftLog('data','trace|hop'+hopIdx+'|L'+li+'|'+latency.toFixed(1)+'ms|'+(dropped?'DROP':denied?'DENY':'OK'),'#8b949e');

      if(!dropped&&!denied){
        var ci=Math.floor(Math.random()*CABLES.length);
        spawnPacket(ci,{speed:0.4+Math.random()*0.3,color:col,
          gateData:{trace:true,hop:hopIdx,layer:li}});
      } else {
        denialEffects.push({layer:li,time:time,type:dropped?'drop':'deny',ttl:60});
        if(dropped) score.dropped++;
        if(denied) score.denied++;
      }
      hopIdx++;nextHop();
    },30+latency*0.5);
  }
  nextHop();
}

function cRot(x,y,z){var x1=x*Math.cos(rotY)-z*Math.sin(rotY);var z1=x*Math.sin(rotY)+z*Math.cos(rotY);var y1=y*Math.cos(rotX)-z1*Math.sin(rotX);var z2=y*Math.sin(rotX)+z1*Math.cos(rotX);return[x1,y1,z2]}
function cProj(x,y,z,rad,W,H){var r=cRot(x,y,z);return{x:W/2+r[0]*rad,y:H/2+r[1]*rad,z:r[2],vis:r[2]<0.15}}
function slerp(a,b,t){var dot=a.x*b.x+a.y*b.y+a.z*b.z;dot=Math.max(-1,Math.min(1,dot));var om=Math.acos(dot);if(om<0.001)return{x:a.x+(b.x-a.x)*t,y:a.y+(b.y-a.y)*t,z:a.z+(b.z-a.z)*t};var s=Math.sin(om);return{x:Math.sin((1-t)*om)/s*a.x+Math.sin(t*om)/s*b.x,y:Math.sin((1-t)*om)/s*a.y+Math.sin(t*om)/s*b.y,z:Math.sin((1-t)*om)/s*a.z+Math.sin(t*om)/s*b.z}}

function drawInfra(arr,radMul,toggle,W,H,baseRad){
  if(!toggle) return;
  arr.forEach(function(f){
    var g=cGeo(f.lon,f.lat);var p=cProj(g.x,g.y,g.z,baseRad*radMul,W,H);
    if(p.z<-0.2) return;
    var a=Math.max(0.1,0.6*(1-Math.abs(p.z)));
    ctx.globalAlpha=a;

    ctx.fillStyle=col;ctx.font='7px '+mono;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(INFRA_SHAPES[f.type]||'●',p.x,p.y);
    if(f.mw){var sz=Math.min(6,Math.max(2,f.mw/300));ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fillStyle=col+'30';ctx.fill();ctx.strokeStyle=col+'60';ctx.lineWidth=0.4;ctx.stroke()}
    if(f.tbps&&f.type==='ixp'){var sz=Math.min(5,f.tbps/4);ctx.beginPath();ctx.moveTo(p.x,p.y-sz);ctx.lineTo(p.x+sz,p.y+sz);ctx.lineTo(p.x-sz,p.y+sz);ctx.closePath();ctx.fillStyle=col+'40';ctx.fill()}
    if(p.z<0.1){ctx.font='4.5px '+mono;ctx.fillStyle='rgba(230,237,243,'+a*0.4+')';ctx.textBaseline='top';ctx.fillText(f.name.split('(')[0].split(' ')[0],p.x,p.y+5)}
    if(f.ping!==undefined){var pp=0.4+0.6*Math.abs(Math.sin(time*2+f.ping));var gl=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,6+f.ping);gl.addColorStop(0,col+(Math.round(pp*60).toString(16).padStart(2,'0')));gl.addColorStop(1,'transparent');ctx.fillStyle=gl;ctx.fillRect(p.x-10,p.y-10,20,20)}
    ctx.globalAlpha=1;
  });
}

function draw(){
  requestAnimationFrame(draw);
  if(!drag) rotY+=0.0015;
  time+=0.016*speed;
  frameCount++;
  var now=performance.now();
  if(now-fpsT>1000){lastFps=Math.round(frameCount*1000/(now-fpsT));frameCount=0;fpsT=now;$('st-fps').textContent='fps:'+lastFps}

  if(autoMode&&Math.random()<0.025*speed&&packets.length<40) spawnPacket(Math.floor(Math.random()*CABLES.length));

  var r=wrap.getBoundingClientRect();var W=r.width,H=r.height;
  ctx.clearRect(0,0,W,H);
  var baseRad=Math.min(W,H)*0.40*zoom;

  var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,baseRad*1.2);
  bg.addColorStop(0,'rgba(14,10,24,0.15)');bg.addColorStop(0.7,'rgba(13,17,23,0.05)');bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  if(!dormantMode){
  for(var li=EARTH_LAYERS.length-1;li>=0;li--){
    var layer=EARTH_LAYERS[li];var layerRad=baseRad*layer.rFrac;
    var lOp=layerOpacity[li]!==undefined?layerOpacity[li]:1;
    ctx.globalAlpha=lOp;
    ctx.beginPath();ctx.arc(W/2,H/2,layerRad,0,Math.PI*2);
    var ringAlpha=li===0?0.15:0.07;
    if(layerFlash[li]){ringAlpha+=(0.03*Math.abs(Math.sin(time*1.2+li*1.1)))}
    var ah=Math.round(ringAlpha*255).toString(16).padStart(2,'0');
    ctx.strokeStyle=layer.color+ah;
    ctx.lineWidth=li===0?1.5:0.8;ctx.stroke();
    var lx2=W/2+layerRad+6;if(lx2<W-80){ctx.fillStyle=layer.color+'90';ctx.font='bold 8px '+mono;ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(layer.iron+' '+layer.name,lx2,H/2-li*2)}
    ctx.globalAlpha=1;
  }

  var cg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,baseRad*0.12);
  cg.addColorStop(0,'rgba(255,100,40,0.12)');cg.addColorStop(0.6,'rgba(255,56,56,0.04)');cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(W/2,H/2,baseRad*0.12,0,Math.PI*2);ctx.fill();

  var pulse=0.4+0.2*Math.sin(time*2);
  ctx.beginPath();ctx.arc(W/2,H/2,2+pulse*1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,200,100,'+pulse*0.35+')';ctx.fill();
  } else {
    ctx.beginPath();ctx.arc(W/2,H/2,baseRad*0.05,0,Math.PI*2);ctx.fillStyle='rgba(255,200,100,0.3)';ctx.fill();
    for(var li=0;li<EARTH_LAYERS.length;li++){var layerRad=baseRad*EARTH_LAYERS[li].rFrac;ctx.beginPath();ctx.arc(W/2,H/2,layerRad,0,Math.PI*2);ctx.strokeStyle=EARTH_LAYERS[li].color+'12';ctx.lineWidth=0.5;ctx.stroke()}
  }

  if(!dormantMode){
  // ═══ COASTLINES ═══
  if(showMap){
    ctx.strokeStyle='rgba(86,212,221,0.25)';ctx.lineWidth=1;
    var drawing=false;
    for(var ci=0;ci<COAST.length;ci++){
      if(COAST[ci]===null){drawing=false;continue}
      var g=cGeo(COAST[ci][0],COAST[ci][1]);
      var p=cProj(g.x,g.y,g.z,baseRad,W,H);
      if(p.z<-0.15){drawing=false;continue}
      var a=Math.max(0.05,0.3*(1-Math.abs(p.z)));
      if(!drawing){ctx.beginPath();ctx.moveTo(p.x,p.y);drawing=true}
      else{ctx.lineTo(p.x,p.y)}
      if(ci+1>=COAST.length||COAST[ci+1]===null){ctx.strokeStyle='rgba(86,212,221,'+a+')';ctx.stroke();drawing=false}
    }
  }

  // ═══ LAT/LON GRID ═══
  if(showGrid){
    ctx.lineWidth=0.4;
    GRID_LATS.forEach(function(lat){
      ctx.beginPath();var started=false;
      var isEquator=(lat===0);var isTropic=(Math.abs(lat)===23.4);var isArctic=(Math.abs(lat)===66.5);
      ctx.strokeStyle=isEquator?'rgba(201,168,76,0.2)':isTropic?'rgba(255,140,56,0.12)':isArctic?'rgba(56,165,255,0.12)':'rgba(200,200,200,0.06)';
      ctx.lineWidth=isEquator?1:0.5;
      if(isTropic||isArctic) ctx.setLineDash([3,5]);
      for(var lo=-180;lo<=180;lo+=5){var g=cGeo(lo,lat);var p=cProj(g.x,g.y,g.z,baseRad,W,H);if(p.z<-0.2){started=false;continue}if(!started){ctx.moveTo(p.x,p.y);started=true}else ctx.lineTo(p.x,p.y)}
      ctx.stroke();ctx.setLineDash([]);
      if(isEquator||isTropic||isArctic){var lbl=isEquator?'Equator':lat>0?(isTropic?'Tropic Cancer':'Arctic'):(isTropic?'Tropic Capricorn':'Antarctic');
        var g=cGeo(10,lat);var p=cProj(g.x,g.y,g.z,baseRad,W,H);if(p.z>-0.1){ctx.fillStyle=isEquator?'rgba(201,168,76,0.35)':'rgba(200,200,200,0.2)';ctx.font='6px '+mono;ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText(lbl,p.x+3,p.y-2)}}
    });
    ctx.strokeStyle='rgba(200,200,200,0.04)';ctx.lineWidth=0.3;
    GRID_LONS.forEach(function(lon){
      ctx.beginPath();var started=false;
      for(var la=-85;la<=85;la+=5){var g=cGeo(lon,la);var p=cProj(g.x,g.y,g.z,baseRad,W,H);if(p.z<-0.2){started=false;continue}if(!started){ctx.moveTo(p.x,p.y);started=true}else ctx.lineTo(p.x,p.y)}
      ctx.stroke();
    });
  }

  // ═══ MAGNETIC POLES + DIPOLE FIELD ═══
  if(showMag){
    var gN=cGeo(MAG_NORTH.lon,MAG_NORTH.lat);var pN=cProj(gN.x,gN.y,gN.z,baseRad,W,H);
    var gS=cGeo(MAG_SOUTH.lon,MAG_SOUTH.lat);var pS=cProj(gS.x,gS.y,gS.z,baseRad,W,H);
    if(pN.z>-0.3){ctx.beginPath();ctx.arc(pN.x,pN.y,5,0,Math.PI*2);ctx.fillStyle='rgba(248,81,73,0.7)';ctx.fill();ctx.fillStyle='#f85149';ctx.font='bold 7px '+mono;ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('N',pN.x,pN.y-7)}
    if(pS.z>-0.3){ctx.beginPath();ctx.arc(pS.x,pS.y,5,0,Math.PI*2);ctx.fillStyle='rgba(88,166,255,0.7)';ctx.fill();ctx.fillStyle='#58a6ff';ctx.font='bold 7px '+mono;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('S',pS.x,pS.y+7)}

    ctx.lineWidth=0.6;
    for(var fl=0;fl<8;fl++){
      var fAngle=(fl/8)*Math.PI*2;
      ctx.beginPath();
      var started=false;
      for(var t=0;t<=48;t++){
        var theta=(t/48)*Math.PI;
        var rF=baseRad*1.08*Math.sin(theta)*Math.sin(theta);
        var fx=rF*Math.cos(fAngle);
        var fy=-rF*Math.cos(theta);
        var fz=rF*Math.sin(fAngle)*Math.sin(MAG_TILT);
        var fy2=fy*Math.cos(MAG_TILT)-fz*Math.sin(MAG_TILT);
        var fz2=fy*Math.sin(MAG_TILT)+fz*Math.cos(MAG_TILT);
        var p=cProj(fx/baseRad,fy2/baseRad,fz2/baseRad,baseRad,W,H);
        if(p.z<-0.3){started=false;continue}
        if(!started){ctx.moveTo(p.x,p.y);started=true}else ctx.lineTo(p.x,p.y);
      }
      ctx.strokeStyle='rgba(167,139,250,'+(0.04+0.03*Math.sin(time*0.5+fl))+')';
      ctx.stroke();
    }
  }

  // Geographic poles (rotation axis)
  var gNP=cGeo(0,90);var pNP=cProj(gNP.x,gNP.y,gNP.z,baseRad,W,H);
  var gSP=cGeo(0,-90);var pSP=cProj(gSP.x,gSP.y,gSP.z,baseRad,W,H);
  ctx.setLineDash([2,3]);ctx.strokeStyle='rgba(200,200,200,0.15)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pNP.x,pNP.y);ctx.lineTo(pSP.x,pSP.y);ctx.stroke();ctx.setLineDash([]);

  if(window._showJunctions) junctions.forEach(function(j){var jR=baseRad*j.r;var jA=j.angle+time*0.02;var jx=W/2+jR*Math.cos(jA);var jy=H/2+jR*Math.sin(jA)*0.4;var jp=0.4+0.6*Math.sin(time*2+j.angle*3);ctx.beginPath();ctx.arc(jx,jy,2+jp,0,Math.PI*2);ctx.fillStyle=j.color+(Math.round(jp*180).toString(16).padStart(2,'0'));ctx.fill()});

  if(window._showCables) CABLES.forEach(function(c){var sA=STATIONS[c.from],sB=STATIONS[c.to];var gA=cGeo(sA.lon,sA.lat),gB=cGeo(sB.lon,sB.lat);ctx.beginPath();for(var t=0;t<=24;t++){var f=t/24;var mid=slerp(gA,gB,f);var p=cProj(mid.x,mid.y,mid.z,baseRad,W,H);if(p.z<-0.3)continue;t===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)}ctx.strokeStyle=c.color+'50';ctx.lineWidth=1.2;ctx.stroke()});

  if(window._showStations){
  STATIONS.forEach(function(st){var g=cGeo(st.lon,st.lat);var p=cProj(g.x,g.y,g.z,baseRad,W,H);if(p.z<-0.2)return;var a=Math.max(0.2,1-Math.abs(p.z)*1.5);ctx.globalAlpha=a;var dR=st.hub?4:2.5;ctx.beginPath();ctx.arc(p.x,p.y,dR,0,Math.PI*2);ctx.fillStyle=st.hub?'#bc8cff':'#58a6ff';ctx.fill();
    if(st.hub){var gl=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,8);gl.addColorStop(0,'rgba(188,140,255,0.12)');gl.addColorStop(1,'transparent');ctx.fillStyle=gl;ctx.fillRect(p.x-8,p.y-8,16,16)}
    if(p.z<-0.05){ctx.globalAlpha=1;return}ctx.font=(st.hub?'bold ':'')+'7px '+mono;ctx.fillStyle='rgba(230,237,243,'+a*0.7+')';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(st.name,p.x,p.y-dR-3);ctx.globalAlpha=1});
  STATIONS.forEach(function(st){if(!st.hub)return;var g=cGeo(st.lon,st.lat);var p1=cProj(g.x,g.y,g.z,baseRad,W,H);if(p1.z<-0.1)return;ctx.strokeStyle='rgba(188,140,255,0.06)';ctx.lineWidth=0.8;ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(p1.x,p1.y);ctx.stroke();ctx.setLineDash([])});
  }

  if(infraShow){
    drawInfra(RESEARCH,1.0,_layerResearch,W,H,baseRad);
    drawInfra(SPACE_INFRA,1.04,_layerSpace,W,H,baseRad);
    drawInfra(DATA_CENTERS,0.99,_layerDC,W,H,baseRad);
    drawInfra(NETWORK_HUBS,1.0,_layerNet,W,H,baseRad);
    drawInfra(POWER_INFRA,0.97,_layerPower,W,H,baseRad);
    drawInfra(MANUFACTURING,1.01,_layerMfg,W,H,baseRad);
    drawInfra(NET_PROTOCOL,1.06,_layerProto,W,H,baseRad);
  }
  } // end !dormantMode for map/cables/stations/infra

  var alive=[];
  var activeCables={};
  packets.forEach(function(pkt){
    var cable=CABLES[pkt.cable];var sA=STATIONS[pkt.fromStation],sB=STATIONS[pkt.toStation];
    var gA=cGeo(sA.lon,sA.lat),gB=cGeo(sB.lon,sB.lat);
    pkt.progress+=0.008*pkt.speed*speed;
    if(!pkt.lastLayer) pkt.lastLayer=-1;
    var px,py,pa=0.9,pr=3;

    if(pkt.phase==='ascend'){
      var t=Math.min(pkt.progress,1);var e=1-Math.pow(1-t,2.5);var sp=cProj(gA.x,gA.y,gA.z,baseRad,W,H);
      px=W/2+(sp.x-W/2)*e;py=H/2+(sp.y-H/2)*e;
      var li=Math.floor(e*EARTH_LAYERS.length);if(li<EARTH_LAYERS.length){pkt.color=EARTH_LAYERS[Math.min(li,EARTH_LAYERS.length-1)].color;pkt.curLayer=li}
      if(li!==pkt.lastLayer&&li<EARTH_LAYERS.length){
        pkt.lastLayer=li;
      }
      // direction arrow only
      var ax=px-W/2,ay=py-H/2;var al=Math.sqrt(ax*ax+ay*ay);if(al>8){var nx=ax/al,ny=ay/al;ctx.fillStyle=pkt.color+'60';ctx.beginPath();ctx.moveTo(px+nx*4,py+ny*4);ctx.lineTo(px-ny*2,py+nx*2);ctx.lineTo(px+ny*2,py-nx*2);ctx.closePath();ctx.fill()}
      if(pkt.progress>=1){pkt.phase='surface';pkt.progress=0;pkt.color=cable.color;pkt.lastLayer=-1}
    } else if(pkt.phase==='surface'){
      activeCables[pkt.cable]=pkt.color;
      var t=Math.min(pkt.progress,1);var mid=slerp(gA,gB,t);var mp=cProj(mid.x,mid.y,mid.z,baseRad,W,H);
      px=mp.x;py=mp.y;pa=mp.z<-0.3?0.1:0.9;pkt.color=cable.color;
      // cable highlight — subtle segment behind packet
      if(pa>0.2){
        ctx.strokeStyle=cable.color+'25';ctx.lineWidth=1.5;ctx.beginPath();
        var seg0=Math.max(0,t-0.08),seg1=Math.min(1,t+0.02);
        for(var st2=0;st2<=8;st2++){var f=seg0+(seg1-seg0)*(st2/8);var m2=slerp(gA,gB,f);var p2=cProj(m2.x,m2.y,m2.z,baseRad,W,H);if(p2.z<-0.3)continue;st2===0?ctx.moveTo(p2.x,p2.y):ctx.lineTo(p2.x,p2.y)}
        ctx.stroke();
      }
      if(pkt.progress>=1){pkt.phase='descend';pkt.progress=0;pkt.lastLayer=-1}
    } else if(pkt.phase==='descend'){
      var t=Math.min(pkt.progress,1);var e=Math.pow(t,2.5);var sp=cProj(gB.x,gB.y,gB.z,baseRad,W,H);
      px=sp.x+(W/2-sp.x)*e;py=sp.y+(H/2-sp.y)*e;
      var li=EARTH_LAYERS.length-1-Math.floor(e*EARTH_LAYERS.length);if(li>=0){pkt.color=EARTH_LAYERS[Math.max(0,li)].color;pkt.curLayer=li}
      if(li!==pkt.lastLayer&&li>=0){
        pkt.lastLayer=li;
      }
      // direction arrow pointing inward
      var ax=W/2-px,ay=H/2-py;var al=Math.sqrt(ax*ax+ay*ay);if(al>8){var nx=ax/al,ny=ay/al;ctx.fillStyle=pkt.color+'60';ctx.beginPath();ctx.moveTo(px+nx*4,py+ny*4);ctx.lineTo(px-ny*2,py+nx*2);ctx.lineTo(px+ny*2,py-nx*2);ctx.closePath();ctx.fill()}
      if(pkt.progress>=1){pkt.laps++;if(pkt.laps>=3)return;pkt.phase='ascend';pkt.progress=0;pkt.fromStation=pkt.toStation;var nc=CABLES[Math.floor(Math.random()*CABLES.length)];pkt.cable=CABLES.indexOf(nc);pkt.fromStation=nc.from;pkt.toStation=nc.to;pkt.lastLayer=-1}
    }

    if(px!==undefined){
      pkt.trail.push({x:px,y:py,color:pkt.color});if(pkt.trail.length>20)pkt.trail.shift();
      for(var ti=1;ti<pkt.trail.length;ti++){var ta=ti/pkt.trail.length*0.25;ctx.strokeStyle=pkt.trail[ti].color+Math.round(ta*255).toString(16).padStart(2,'0');ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pkt.trail[ti-1].x,pkt.trail[ti-1].y);ctx.lineTo(pkt.trail[ti].x,pkt.trail[ti].y);ctx.stroke()}
      ctx.globalAlpha=pa;
      ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fillStyle=pkt.color;ctx.fill();
      ctx.globalAlpha=1;
    }
    alive.push(pkt);
  });
  packets=alive;

  // ═══ DENIAL / LOSS / CROSSING VISUAL EFFECTS ═══
  var aliveEffects=[];
  denialEffects.forEach(function(de){
    var age=time-de.time;if(age>de.ttl)return;
    aliveEffects.push(de);
    var layerRad=baseRad*EARTH_LAYERS[Math.min(de.layer,EARTH_LAYERS.length-1)].rFrac;
    var alpha=Math.max(0,1-age/de.ttl);
    if(de.type==='cross'){
      var col=de.color||EARTH_LAYERS[de.layer].color;
      var ca=Math.round(alpha*30);
      ctx.strokeStyle=col+(ca<16?'0':'')+ca.toString(16);
      ctx.lineWidth=1+alpha*0.8;
      ctx.beginPath();ctx.arc(W/2,H/2,layerRad,0,Math.PI*2);ctx.stroke();
      if(alpha>0.7){
        var sparkAngle=time*2+de.layer*1.5;
        var sx=W/2+layerRad*Math.cos(sparkAngle);var sy=H/2+layerRad*Math.sin(sparkAngle)*0.4;
        ctx.beginPath();ctx.arc(sx,sy,1.5+alpha,0,Math.PI*2);
        var sa2=Math.round(alpha*50);ctx.fillStyle=col+(sa2<16?'0':'')+sa2.toString(16);ctx.fill();
      }
    } else if(de.type==='drop'){
      ctx.strokeStyle='rgba(248,81,73,'+alpha*0.2+')';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.arc(W/2,H/2,layerRad,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      var xSz=4+age*0.2;
      ctx.strokeStyle='rgba(248,81,73,'+alpha*0.4+')';ctx.lineWidth=1.5;
      var xA=time*0.5+de.layer;var xx=W/2+layerRad*Math.cos(xA);var xy=H/2+layerRad*Math.sin(xA)*0.4;
      ctx.beginPath();ctx.moveTo(xx-xSz,xy-xSz);ctx.lineTo(xx+xSz,xy+xSz);ctx.stroke();
      ctx.beginPath();ctx.moveTo(xx+xSz,xy-xSz);ctx.lineTo(xx-xSz,xy+xSz);ctx.stroke();
    } else {
      ctx.strokeStyle='rgba(255,140,56,'+alpha*0.15+')';ctx.lineWidth=0.8;
      var segs=8+de.layer*2;
      for(var s=0;s<segs;s++){
        var a1=(s/segs)*Math.PI*2;var a2=((s+0.3)/segs)*Math.PI*2;
        ctx.beginPath();ctx.arc(W/2,H/2,layerRad,a1,a2);ctx.stroke();
      }
      ctx.fillStyle='rgba(255,140,56,'+alpha*0.3+')';ctx.font='bold 8px '+mono;ctx.textAlign='center';
      var bx=W/2+layerRad*Math.cos(time*0.3+de.layer*2);var by=H/2+layerRad*Math.sin(time*0.3+de.layer*2)*0.4;
      ctx.fillText('⊘',bx,by);
    }
  });
  denialEffects=aliveEffects;

  // Gate alert rings
  gateStates.forEach(function(gate,gi){
    if(gate.alertLevel>0){
      var layerRad=baseRad*EARTH_LAYERS[Math.min(gi,EARTH_LAYERS.length-1)].rFrac;
      var blink=Math.sin(time*4+gi)*0.5+0.5;
      var aCol=gate.alertLevel>5?'rgba(248,81,73,':'rgba(255,140,56,';
      ctx.strokeStyle=aCol+(blink*0.15*Math.min(gate.alertLevel,10)/10)+')';
      ctx.lineWidth=gate.alertLevel>5?2:1;
      ctx.beginPath();ctx.arc(W/2,H/2,layerRad,0,Math.PI*2);ctx.stroke();
      gate.alertLevel=Math.max(0,gate.alertLevel-0.002);
    }
  });

  var asc=0,sur=0,des=0;
  packets.forEach(function(p){if(p.phase==='ascend')asc++;else if(p.phase==='surface')sur++;else des++});
  var hudExtra='';
  if(score.traversals||score.denied||score.dropped){
    hudExtra='<br><span style="color:#3fb950">✓'+score.traversals+'</span> <span style="color:#f85149">✗'+score.dropped+'</span> <span style="color:#ff8c38">⊘'+score.denied+'</span>';
    hudExtra+='<br><span style="color:#c9a84c">Score: '+((score.traversals*10+score.recon*5+score.exploits*25)-(score.denied*3+score.dropped*2))+'</span>';
  }
  if(score.flags.length) hudExtra+='<br><span style="color:#a78bfa">🚩'+score.flags.length+' flags</span>';

  // ─── MAP / GRID / MAG ───
  else if(c0==='map'){showMap=!showMap;logMsg('Coastlines: '+(showMap?'ON':'OFF'))}
  else if(c0==='grid'){showGrid=!showGrid;logMsg('Lat/lon grid: '+(showGrid?'ON':'OFF'))}
  else if(c0==='mag'||c0==='magnetic'){showMag=!showMag;logMsg('Magnetic field: '+(showMag?'ON':'OFF'))}
  else if(c0==='dormant'||c0==='dark'){dormantMode=!dormantMode;$('cr-dormant').style.color=dormantMode?'#3fb950':'#c9d1d9';$('cr-dormant').style.borderColor=dormantMode?'#3fb950':'#30363d';logMsg('Dormant: '+(dormantMode?'ON — data flow only':'OFF'))}
  else if(c0==='settings'||c0==='config'){settingsOpen=!settingsOpen;$('settings').style.display=settingsOpen?'block':'none';$('cr-settings').style.borderColor=settingsOpen?'#58a6ff':'#30363d';if(settingsOpen)buildSettings();logMsg('Settings: '+(settingsOpen?'ON':'OFF'))}
  else if(c0==='info'){infoOpen=!infoOpen;$('cr-info').style.borderColor=infoOpen?'#58a6ff':'#30363d';if(!infoOpen){$('info').style.display='none'}else{$('info').innerHTML='<div class="info-hdr">📍 Hover a facility</div>';$('info').style.display='block'}logMsg('Info panel: '+(infoOpen?'ON — hover facilities':'OFF'))}
  else if(c0==='opacity'){var li2=parseInt(parts[1]),v2=parseInt(parts[2]);if(!isNaN(li2)&&!isNaN(v2)&&li2>=0&&li2<6){layerOpacity[li2]=Math.max(0,Math.min(1,v2/100));logMsg('Layer '+li2+' opacity → '+v2+'%')}else{logMsg('opacity <layer 0-5> <0-100>')}}
  else if(c0==='flash'){var li3=parseInt(parts[1]);if(!isNaN(li3)&&li3>=0&&li3<6){layerFlash[li3]=!layerFlash[li3];logMsg('Layer '+li3+' flash: '+(layerFlash[li3]?'ON':'OFF'))}else{logMsg('flash <layer 0-5>')}}
  // ─── QUANTUM / DAC / STENO / CONTRAIL ───
  else if(c0==='gutter'){
    gutterMode=!gutterMode;logMsg('Quantum gutter: '+(gutterMode?'ON':'OFF'));
  }
  else if(c0==='prefix'||c0==='classify'){
    var text=parts.slice(1).join(' ');
    if(!text){logMsg('prefix <code>  — classify a line');return}
    var QP=window.QuantumPrefixes;
    if(!QP){logMsg('quantum-prefixes.js not loaded','#f85149');return}
    var cls=QP.classifyLine(text,qLang);
    logMsg('Sym: '+cls.sym+' | Class: '+cls.cls+' | Cat: '+cls.category+' | Gate: '+(SYM_GATES[cls.sym]||'?'));
    ftLog('data','classify|'+cls.sym+'|'+cls.cls+'|'+cls.category+'|'+text.substring(0,40),SYM_COLORS[cls.sym]||'#8b949e');
  }
  else if(c0==='dac'){
    var sub=parts[1]||'stats';
    var DAC=window.prefixDAC;
    if(!DAC){logMsg('qbit-dac.js not loaded','#f85149');return}
    if(sub==='stats'){
      try{var ds=DAC.dacStats();logMsg('DAC calls:'+ds.calls+' lines:'+ds.lines+' lps:'+ds.lps.toFixed(0)+' sources:'+JSON.stringify(ds.sources||{}))}catch(e){logMsg('DAC: '+dacCallCount+' calls')}
    } else if(sub==='mode'){
      var m=parts[2];
      if(m){try{DAC.dacMode(m);logMsg('DAC mode → '+m)}catch(e){logMsg('Error: '+e.message,'#f85149')}}
      else{try{logMsg('DAC mode: '+DAC.dacMode())}catch(e){logMsg('DAC mode: prefix (default)')}}
    } else if(sub==='tracks'){
      var code=parts.slice(2).join(' ')||'function hello() { return 42; }';
      try{var tracks=DAC.dacTracks(code,qLang);tracks.forEach(function(t){logMsg(t.track+' d'+t.depth+' '+t.sym+' '+t.stack.join('›'))})}catch(e){logMsg('Error: '+e.message,'#f85149')}
    } else if(sub==='complexity'){
      var code=parts.slice(2).join(' ')||'if(x){for(i=0;i<n;i++){try{f()}catch(e){throw e}}}';
      try{var cx=DAC.dacComplexity(code,qLang);logMsg('Complexity: '+cx.score+' maxD:'+cx.maxDepth+' avgD:'+cx.avgDepth.toFixed(1)+' hotspots:'+cx.hotspots)}catch(e){logMsg('Error: '+e.message,'#f85149')}
    } else {logMsg('dac stats|mode [m]|tracks [code]|complexity [code]')}
  }
  else if(c0==='steno'){
    var sub=parts[1]||'stats';
    var QS=window.QbitSteno;
    if(!QS){logMsg('qbit-steno.js not loaded','#f85149');return}
    if(sub==='stats'){
      logMsg('Steno: 13 Unicode spaces · 19b/line');
      logMsg('Lines encoded: '+stenoTotalLines+' | Bits: '+stenoTotalBits);
    } else if(sub==='encode'){
      var code=parts.slice(2).join(' ')||'x = 42';
      try{var r=QS.stenoEncode(code,qLang);stenoTotalLines+=r.stats.lines||1;stenoTotalBits+=r.stats.bitsEncoded||19;
        logMsg('Encoded '+r.stats.lines+' lines ('+r.stats.bitsEncoded+'b)');
        logMsg('Capacity: '+r.stats.capacity+'b available');
        ftLog('data','steno|encode|'+r.stats.lines+'L|'+r.stats.bitsEncoded+'b|cap:'+r.stats.capacity,'#56d4dd');
      }catch(e){logMsg('Error: '+e.message,'#f85149')}
    } else if(sub==='decode'){
      var code=parts.slice(2).join(' ');
      try{var r=QS.stenoDecode(code);logMsg('Decoded: '+r.lines.length+' lines, encoded:'+r.encoded);
        r.meta.forEach(function(m,i){logMsg('  L'+i+': sym='+m.sym+' gate='+m.gate+' depth='+m.depth)});
      }catch(e){logMsg('Error: '+e.message,'#f85149')}
    } else if(sub==='analyze'){
      var code=parts.slice(2).join(' ')||'var x = 1;\nif(x) { print(x); }';
      try{var r=QS.stenoAnalyze(code);logMsg('Capacity: '+r.totalCapacity+'b over '+r.lines+' lines')}catch(e){logMsg('Error: '+e.message,'#f85149')}
    } else if(sub==='pipeline'){
      var code=parts.slice(2).join(' ')||'function f(x) { return x * 2; }';
      try{var r=QS.stenoPipeline(code,qLang);
        r.stages.forEach(function(s){logMsg('  L'+s.layer+' '+s.name+': '+(s.ms||0).toFixed(2)+'ms',s.ok?'#3fb950':'#f85149')});
        logMsg('Pipeline: '+r.stages.length+' stages, '+(r.totalMs||0).toFixed(2)+'ms total');
      }catch(e){logMsg('Error: '+e.message,'#f85149')}
    } else {logMsg('steno stats|encode [code]|decode [code]|analyze [code]|pipeline [code]')}
  }
  else if(c0==='contrail'){
    if(contrailBuf.length===0){logMsg('No contrail data — run commands first');return}
    logMsg('Contrail: '+contrailBuf.length+' entries');
    var dist={};contrailBuf.forEach(function(s){dist[s]=(dist[s]||0)+1});
    Object.keys(dist).sort(function(a,b){return dist[b]-dist[a]}).forEach(function(s){
      var pct=(dist[s]/contrailBuf.length*100).toFixed(1);
      logMsg('  '+s.padEnd(4)+' '+dist[s]+' ('+pct+'%)',SYM_COLORS[s]||'#8b949e');
    });
    if(!ftActive.quantum){ftToggle('quantum')}ftQuantum();
  }
  else if(c0==='coverage'){
    var cov=qLines>0?(qClassified/qLines*100).toFixed(1):'0.0';
    logMsg('Coverage: '+cov+'% ('+qClassified+'/'+qLines+')');
    logMsg('Prefixes: '+Object.keys(prefixCounts).length+' symbols active');
    Object.keys(prefixCounts).sort(function(a,b){return prefixCounts[b]-prefixCounts[a]}).forEach(function(s){
      logMsg('  '+s.padEnd(4)+' '+prefixCounts[s]+' ['+SYM_GATES[s]+']',SYM_COLORS[s]);
    });
  }
  else if(c0==='qbit'||c0==='quantum'){
    if(!ftActive.quantum){ftToggle('quantum')}ftQuantum();
    logMsg('Quantum panel opened');
  }
  else if(c0==='lang'){
    var lang=parts[1];
    if(lang){qLang=lang;logMsg('Language → '+qLang)}
    else{logMsg('Language: '+qLang+' (set with: lang <name>)');logMsg('Available: python, javascript, typescript, rust, go, shell, c, cpp, html, css, markdown, sql, yaml, json, arduino, nushell, java, swift, kotlin, ...')}
  }
  else if(c0==='gluelam'){
    logMsg('═══ GLUELAM STACK ═══');
    logMsg('quantum-prefixes.js: '+(window.QuantumPrefixes?'✓ loaded — 59 languages, 11 symbols':'✗ missing'),'#e040fb');
    logMsg('qbit-dac.js: '+(window.prefixDAC?'✓ loaded — tracks, stripes, complexity, .qbit codec':'✗ missing'),'#a78bfa');
    logMsg('qbit-steno.js: '+(window.QbitSteno?'✓ loaded — 13 Unicode spaces, 19b/line, pipeline':'✗ missing'),'#56d4dd');
    logMsg('qbitCodec: '+(window.qbitCodec?'✓ loaded — encode/decode/wrap/extract/reinject':'✗ missing'),'#c9a84c');
    logMsg('Gutter: '+(gutterMode?'ON':'OFF')+' | Lang: '+qLang+' | Lines: '+qLines+' | Coverage: '+(qLines>0?(qClassified/qLines*100).toFixed(1):'0')+'%');
    logMsg('Contrail: '+contrailBuf.length+'/'+contrailMax+' | Steno: '+stenoTotalLines+'L/'+stenoTotalBits+'b');
  }
  else if(c0==='.qbit'||c0==='encode'){
    var code=parts.slice(1).join(' ');
    if(!code){logMsg('.qbit <code> — encode with full DAC+steno pipeline');return}
    var QC=window.qbitCodec;
    if(!QC){logMsg('qbitCodec not available','#f85149');return}
    try{
      var r=QC.encode(code,qLang,'core-race');
      logMsg('.qbit encoded: '+code.split('\n').length+' lines');
      stenoTotalLines+=code.split('\n').length;stenoTotalBits+=code.split('\n').length*19;
      ftLog('data','qbit|encode|'+code.split('\n').length+'L|'+qLang,'#e040fb');
    }catch(e){logMsg('Error: '+e.message,'#f85149')}
  }
  // ─── PANELS ───
  else if(c0==='panels'||c0==='windows'||c0==='win'){
    ['sitrep','comms','gates','data','quantum'].forEach(function(p){ftToggle(p);if(p==='sitrep'&&ftActive.sitrep)ftSitrep();if(p==='gates'&&ftActive.gates)ftGates();if(p==='quantum'&&ftActive.quantum)ftQuantum()});
    logMsg('All panels toggled');
  }
  // ─── ORIGINAL COMMANDS ───
  else if(c0==='packets'||c0==='pkt'){logMsg('Active: '+packets.length)}
  else if(c0==='cables'){CABLES.forEach(function(c,i){logMsg(i+': '+c.name+' ('+STATIONS[c.from].name+' → '+STATIONS[c.to].name+')')})}
  else if(c0==='stations'){STATIONS.forEach(function(s,i){logMsg(i+': '+s.name+(s.hub?' [HUB]':''))})}
  else if(c0==='facilities'||c0==='fac'){logMsg('Research:'+RESEARCH.length+' Space:'+SPACE_INFRA.length+' DC:'+DATA_CENTERS.length+' Net:'+NETWORK_HUBS.length+' Power:'+POWER_INFRA.length+' Mfg:'+MANUFACTURING.length+' Proto:'+NET_PROTOCOL.length+' Total:'+totalInfra)}
  else if(c0==='layers'){EARTH_LAYERS.forEach(function(l){logMsg(l.iron+' '+l.name+' r='+l.rFrac+' budget='+l.budget)})}
  else if(c0==='bench'){var t0=performance.now();for(var i=0;i<10000;i++)cGeo(Math.random()*360-180,Math.random()*180-90);for(var i=0;i<1000;i++){var a=cGeo(0,0),b=cGeo(90,45);slerp(a,b,Math.random())}logMsg('Bench: 11K ops in '+(performance.now()-t0).toFixed(2)+'ms')}
  else{logMsg('Unknown: '+cmd+' — type help')}
}

input.addEventListener('keydown',function(e){
  if(e.key==='Enter'){exec(input.value);input.value=''}
  else if(e.key==='ArrowUp'){e.preventDefault();if(cmdHistory.length){hi=hi<0?cmdHistory.length-1:Math.max(0,hi-1);input.value=cmdHistory[hi]||''}}
  else if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(cmdHistory.length,hi+1);input.value=cmdHistory[hi]||''}
});

document.querySelectorAll('.tb').forEach(function(b){
  b.addEventListener('click',function(){
    var h=this.dataset.h;if(h&&h!=='qbit-core-race')location.href=h+'.html';
  });
});

try{
  var ironBC=new BroadcastChannel('iron-line');
  ironBC.onmessage=function(e){
    if(e.data&&e.data.type==='gate-submit'&&e.data.source==='ugrad-photonic-park'){
      var ci=e.data.gate%CABLES.length;
      spawnPacket(ci,{speed:0.6+Math.random()*0.3,color:e.data.riderColor||'#a78bfa',gateData:{gate:e.data.gate,rider:e.data.riderName,verdict:e.data.verdict,nQ:e.data.nQ}});
      try{var ack=new BroadcastChannel('iron-line');ack.postMessage({type:'gate-globe-ack',source:'qbit-core-race',gate:e.data.gate,rider:e.data.rider,t:performance.now()});ack.close()}catch(ex){}
      logMsg('GATE '+e.data.gate+': '+e.data.riderName+' → '+e.data.verdict+' ('+e.data.nQ+'Q) ↑crust');
      ftLog('comms','↑ GATE '+e.data.gate+': '+e.data.riderName+' → '+e.data.verdict,'#e040fb');
      ftLog('data','gate|submit|G'+e.data.gate+'|'+e.data.riderName+'|'+e.data.verdict+'|'+e.data.nQ+'Q','#e040fb');
      var hud=$('hud');if(hud){var gp=hud.querySelector('.gate-pip');if(!gp){gp=document.createElement('div');gp.className='gate-pip';gp.style.cssText='color:#e040fb;font-size:9px;margin-top:4px;border-top:1px solid #21262d;padding-top:4px';hud.appendChild(gp)}gp.textContent='GATE '+e.data.gate+': '+e.data.riderName+' ↑crust'}
    }
    if(e.data&&e.data.type==='gate-result'&&e.data.source==='ugrad-photonic-park'){
      var ci=(e.data.gate+3)%CABLES.length;
      var hf=e.data.hellingerFidelity||0;
      spawnPacket(ci,{phase:'descend',progress:1,speed:0.5+Math.random()*0.3,color:hf>0.9?'#3fb950':hf>0.7?'#ffe138':'#f85149',gateData:{gate:e.data.gate,rider:e.data.riderName,hFid:hf}});
      logMsg('IBM G'+e.data.gate+': '+e.data.riderName+' H:'+(hf*100).toFixed(1)+'% ↓core');
      ftLog('comms','↓ IBM G'+e.data.gate+': '+e.data.riderName+' H:'+(hf*100).toFixed(1)+'%',hf>0.9?'#3fb950':'#ff8c38');
      ftLog('data','gate|result|G'+e.data.gate+'|'+e.data.riderName+'|H:'+(hf*100).toFixed(1)+'%',hf>0.9?'#3fb950':'#f85149');
      var hud=$('hud');if(hud){var gp=hud.querySelector('.gate-pip');if(!gp){gp=document.createElement('div');gp.className='gate-pip';gp.style.cssText='color:#3fb950;font-size:9px;margin-top:4px;border-top:1px solid #21262d;padding-top:4px';hud.appendChild(gp)}gp.textContent='IBM G'+e.data.gate+': H:'+(hf*100).toFixed(1)+'% ↓core'}
    }
    if(e.data&&e.data.type==='scan-locate'&&e.data.point){
      var pt=e.data.point;
      logMsg('SCAN: idx='+pt.idx+' θ='+(pt.theta*180/Math.PI).toFixed(1)+'° score='+pt.score.toFixed(3)+' L'+e.data.layer);
    }
  };
}catch(ex){}

try{
  var kbBC=new BroadcastChannel('kbatch-training');
  kbBC.onmessage=function(e){
    if(e.data&&e.data.contrail){
      logMsg('kbatch contrail: '+e.data.contrail.length+' pts');
      ftLog('comms','↓ kbatch contrail: '+e.data.contrail.length+' pts','#c9a84c');
      e.data.contrail.forEach(function(pt){
        if(pt.sym) contrailBuf.push(pt.sym);
      });
      while(contrailBuf.length>contrailMax) contrailBuf.shift();
    }
  };
}catch(ex){}

try{
  var dacBC=new BroadcastChannel('qbit-dac');
  dacBC.onmessage=function(e){
    if(e.data&&e.data.type==='dac-stats'){
      ftLog('data','dac-sync|'+e.data.source+'|calls:'+e.data.calls+'|lines:'+e.data.lines+'|lps:'+(e.data.lps||0).toFixed(0),'#a78bfa');
    }
  };
  setInterval(function(){
    try{
      dacBC.postMessage({type:'dac-stats',source:'qbit-core-race',calls:dacCallCount,lines:qLines,lps:dacLPS,coverage:qLines>0?qClassified/qLines:0});
    }catch(e){}
  },5000);
}catch(ex){}

$('st-boot').textContent='boot:'+(performance.now()-T0).toFixed(1)+'ms';
logShow=true;$('log').style.display='block';
logMsg('═══ CORE RACE · OSINT · QUANTUM TERMINAL ═══');
logMsg(CABLES.length+' cables · '+STATIONS.length+' stations · '+totalInfra+' facilities · '+gateStates.length+' security gates');
logMsg('Quantum: 11 prefixes · 59 langs · DAC+ · steno · gluelam');
logMsg('Type help for commands');

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
// ===== QUANTUM PREFIX LIVE SYNC =====
var QP=window.QuantumPrefixes;
if(QP){
  QP.onStateChange(function(source,state){
    if(source==='qbit-core-race'||!state) return;
    ftLog('data','qp-sync|'+source+'|cov:'+(state.coverage||0).toFixed(1)+'%|lines:'+(state.totalLines||0),'#e040fb');
  });
  setInterval(function(){
    if(!QP) return;
    QP.broadcastState('qbit-core-race',{
      coverage:qLines>0?qClassified/qLines*100:0,
      totalLines:qLines,classifiedLines:qClassified,
      prefixCounts:prefixCounts,role:'core-race-osint-terminal',
      contrailLength:contrailBuf.length,stenoLines:stenoTotalLines,
      dacCalls:dacCallCount,language:qLang
    });
  },5000);
  QP.requestStateSync();
}
var PDAC=window.prefixDAC;
if(PDAC){logMsg('DAC+ loaded: tracks · stripes · complexity · .qbit codec','#a78bfa')}
var QSTENO=window.QbitSteno;
if(QSTENO){logMsg('Steno loaded: 13 Unicode spaces · 19b/line · pipeline','#56d4dd')}
var QCODEC=window.qbitCodec;
if(QCODEC){logMsg('qbitCodec loaded: encode · decode · wrap · extract','#c9a84c')}
})();

</script>
</body>
