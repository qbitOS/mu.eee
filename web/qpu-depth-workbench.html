<!-- beyondBINARY quantum-prefixed | uvspeed | {n, +1, -n, +0, 0, -1, +n, +2, -0, +3, 1} -->
<!-- Depth grid + Base Box + vertical grid rails + gutter stats + live code (Framer refs in HUD) -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#06070d">
<title>QPU Depth Workbench</title>
<link rel="stylesheet" href="quantum-theme.css">
<script src="quantum-prefixes.js"></script>
<script src="qbit-dac.js"></script>
<script src="qbit-steno.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06070d;--bg2:#0c1018;--text:#e6eaf2;--dim:#6b7285;--cyan:#56d4dd;--gold:#c9a84c;--green:#3dd68d;--purple:#a78bfa;
  --mono:ui-monospace,'SF Mono',monospace;--sans:system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font:13px var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased}
a{color:var(--cyan)}
#app{display:grid;grid-template-rows:auto 1fr;min-height:100%}
.top{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.06);font:500 10px var(--mono);color:var(--dim);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.top b{color:var(--gold)}
.work{display:grid;grid-template-columns:minmax(0,220px) 12px minmax(260px,360px) 12px 1fr;min-height:0;height:100%}
@media(max-width:1024px){.work{grid-template-columns:1fr;grid-template-rows:auto auto 1fr;overflow:auto;height:auto;min-height:100%}.v-sep{display:none}}

/* --- Vertical grid lines rails (Framer Vertical Grid Lines–style) --- */
.v-sep{
  display:flex;justify-content:space-evenly;align-items:stretch;background:var(--bg);
  border-left:1px solid rgba(86,212,221,.08);border-right:1px solid rgba(86,212,221,.08);
  min-height:120px;
}
.v-sep .vline{
  flex:0 0 1px;align-self:stretch;background:rgba(120,170,220,.11);position:relative;overflow:hidden;
}
.v-sep .vline i{
  position:absolute;left:-1px;width:3px;margin-left:-1px;border-radius:1px;
  height:18%;background:linear-gradient(180deg,transparent,rgba(160,220,255,.45),transparent);
  box-shadow:0 0 10px rgba(120,200,255,.25);
  animation:vtravel 3.2s ease-in-out infinite;opacity:.7;
  animation-delay:calc(var(--d,0)*0.45s);
}
@keyframes vtravel{0%,100%{top:6%;opacity:.2}50%{top:72%;opacity:1}}
@media (prefers-reduced-motion:reduce){.v-sep .vline i{animation:none;top:40%;opacity:.5}}

.col{min-width:0;display:flex;flex-direction:column;min-height:0}
.col-strip{background:var(--bg2);border-right:1px solid rgba(255,255,255,.05);padding:10px;overflow:auto}
.col-strip .pat-label{font:600 9px var(--mono);color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
#mini-canvas{width:100%;aspect-ratio:1;border-radius:8px;background:#0a0b12}

/* --- Center: Base Box + DepthGrid tilt + gutter --- */
.depth-stack{padding:12px;overflow:auto;display:flex;flex-direction:column;gap:14px;background:var(--bg)}
.base-shell{padding:2px;border-radius:14px;background:linear-gradient(135deg,rgba(86,212,221,.48),rgba(167,139,250,.38),rgba(201,168,76,.3));box-shadow:0 12px 36px rgba(0,0,0,.5)}
.base-inner{border-radius:12px;background:var(--bg2);border:1px solid rgba(255,255,255,.05);padding:12px}
.base-inner h3{font:600 10px var(--mono);color:var(--gold);letter-spacing:.1em;margin-bottom:10px;text-transform:uppercase}
.depth-stage{
  perspective:920px;perspective-origin:50% 40%;
  border-radius:10px;min-height:200px;
}
.depth-card{
  position:relative;transform-style:preserve-3d;border-radius:10px;padding:12px;
  background:linear-gradient(165deg,rgba(18,24,36,.95),rgba(8,10,16,.98));
  border:1px solid rgba(86,212,221,.14);
  box-shadow:0 20px 50px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04);
  transition:box-shadow .18s,border-color .18s,filter .18s;
}
.depth-card:hover,.depth-card.grid-hot{
  border-color:rgba(61,214,141,.42);box-shadow:0 24px 56px rgba(0,0,0,.5),0 0 0 1px rgba(61,214,141,.12),inset 0 0 24px rgba(61,214,141,.06);
  filter:brightness(1.03);
}
.qpu-toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font:11px var(--mono);color:var(--dim)}
.qpu-toggle-row input{width:16px;height:16px;accent-color:var(--green)}
.gutter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:6px;font:9px var(--mono);opacity:.92}
.gutter-grid span{display:flex;flex-direction:column;gap:2px;padding:6px;border-radius:6px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.06)}
.gutter-grid .sym{color:var(--cyan);font-weight:700}
.gutter-grid .ct{color:var(--text);font-size:12px;font-weight:600}
.gutter-grid.muted{opacity:.35;filter:grayscale(.4)}
.rubik-wrap{margin-top:12px;perspective:200px;height:64px;display:flex;align-items:center;justify-content:center}
.rubik{
  width:48px;height:48px;position:relative;transform-style:preserve-3d;
  transition:transform .35s ease-out;cursor:pointer;
}
.rubik span{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font:700 8px var(--mono);border:1px solid rgba(255,255,255,.12);border-radius:6px;backface-visibility:hidden;
}
.rubik .f{background:rgba(86,212,221,.25);transform:translateZ(24px)}
.rubik .b{background:rgba(167,139,250,.2);transform:rotateY(180deg) translateZ(24px)}
.rubik .r{background:rgba(61,214,141,.2);transform:rotateY(90deg) translateZ(24px)}
.rubik .l{background:rgba(201,168,76,.2);transform:rotateY(-90deg) translateZ(24px)}
.rubik .u{background:rgba(255,255,255,.08);transform:rotateX(90deg) translateZ(24px)}
.rubik .d{background:rgba(80,90,110,.3);transform:rotateX(-90deg) translateZ(24px)}

/* Code column — iron-dispatch / iron-browser */
.code-col{background:var(--bg2);border-left:1px solid rgba(255,255,255,.06);padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0}
.code-col label{font:600 9px var(--mono);color:var(--gold);letter-spacing:.08em}
#live-code{flex:1;min-height:200px;width:100%;resize:none;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:var(--bg);color:var(--text);font:12px var(--mono);line-height:1.45}
#live-code:focus{outline:none;border-color:rgba(167,139,250,.45)}
.toolbar{display:flex;flex-wrap:wrap;gap:8px}
.toolbar button{
  padding:8px 12px;border-radius:8px;border:1px solid rgba(86,212,221,.35);background:rgba(86,212,221,.1);
  color:var(--cyan);font:600 10px var(--mono);cursor:pointer;
}
.toolbar button:hover{background:rgba(86,212,221,.18)}
.toolbar a.button{display:inline-flex;align-items:center;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);font:600 10px var(--mono);text-decoration:none;color:var(--dim)}
.toolbar a.button:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <b>QPU Depth Workbench</b> —
    <span>Depth tilt ≈ <a href="https://www.framer.com/marketplace/components/depthgrid3dfx/" rel="noopener noreferrer">DepthGrid3DFX</a></span> ·
    <span>Hover ≈ <a href="https://www.framer.com/marketplace/components/grid-hover-effect/" rel="noopener noreferrer">Grid Hover</a> + <a href="https://www.framer.com/marketplace/components/base-box/" rel="noopener noreferrer">Base Box</a></span> ·
    <span>Rails ≈ <a href="https://www.framer.com/marketplace/components/vertical-grid-lines/" rel="noopener noreferrer">Vertical Grid Lines</a></span>
  </header>
  <div class="work">
    <aside class="col col-strip">
      <div class="pat-label">Interactive grid</div>
      <canvas id="mini-canvas" width="400" height="400" aria-hidden="true"></canvas>
    </aside>
    <div class="v-sep" aria-hidden="true">
      <div class="vline" style="--d:0"><i></i></div>
      <div class="vline" style="--d:1"><i></i></div>
      <div class="vline" style="--d:2"><i></i></div>
      <div class="vline" style="--d:3"><i></i></div>
    </div>
    <section class="col depth-stack" id="depth-col">
      <div class="base-shell"><div class="base-inner">
        <h3>Slice A · gutter state</h3>
        <div class="depth-stage" data-slot="0">
          <div class="depth-card" id="card-0">
            <div class="qpu-toggle-row"><label><input type="checkbox" id="qpu-0" checked> Quantum gutter numbers</label></div>
            <div class="gutter-grid" id="stats-0"></div>
            <div class="rubik-wrap" title="Click to cycle face (Rubik-style preview)">
              <div class="rubik" id="rubik-0" tabindex="0" role="button" aria-label="Cycle cube face">
                <span class="f">QPU</span><span class="b">◇</span><span class="r">+1</span><span class="l">0</span><span class="u">n</span><span class="d">-1</span>
              </div>
            </div>
          </div>
        </div>
      </div></div>
      <div class="base-shell"><div class="base-inner">
        <h3>Slice B · gutter state</h3>
        <div class="depth-stage" data-slot="1">
          <div class="depth-card" id="card-1">
            <div class="qpu-toggle-row"><label><input type="checkbox" id="qpu-1" checked> Quantum gutter numbers</label></div>
            <div class="gutter-grid" id="stats-1"></div>
            <div class="rubik-wrap">
              <div class="rubik" id="rubik-1" tabindex="0" role="button" aria-label="Cycle cube face">
                <span class="f">DAC</span><span class="b">⊤</span><span class="r">□</span><span class="l">○</span><span class="u">⊢</span><span class="d">→</span>
              </div>
            </div>
          </div>
        </div>
      </div></div>
    </section>
    <div class="v-sep" aria-hidden="true">
      <div class="vline" style="--d:1"><i></i></div>
      <div class="vline" style="--d:2"><i></i></div>
      <div class="vline" style="--d:3"><i></i></div>
      <div class="vline" style="--d:4"><i></i></div>
    </div>
    <section class="col code-col">
      <label for="live-code">Live source (classify → slices)</label>
      <textarea id="live-code" spellcheck="false" data-lang="javascript">// +1: sample for quantum gutter
0: function hello(name) {
1:   return `Hi ${name}`;
-0: }</textarea>
      <div class="toolbar">
        <button type="button" id="btn-classify">Classify · refresh gutter</button>
        <a class="button" href="iron-dispatch-v2-snapshot.html">Iron Dispatch v2</a>
        <a class="button" href="iron-browser.html">Iron Browser</a>
        <a class="button" href="qpu-interactive-field.html">QPU Field</a>
      </div>
    </section>
  </div>
</div>

<script>
(function () {
  'use strict';
  var SYMS = ['n:', '+1:', '-n:', '+0:', '0:', '-1:', '+n:', '+2:', '-0:', '+3:', '1:'];
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function el(id) { return document.getElementById(id); }

  function renderStats(slot, meta) {
    var root = el('stats-' + slot);
    var on = el('qpu-' + slot).checked;
    root.classList.toggle('muted', !on);
    root.innerHTML = '';
    if (!on || !meta) return;
    var bySym = {};
    (meta.lines || []).forEach(function (L) {
      if (L && L.sym) bySym[L.sym] = (bySym[L.sym] || 0) + 1;
    });
    SYMS.forEach(function (s) {
      var c = bySym[s] != null ? bySym[s] : 0;
      var sp = document.createElement('span');
      sp.innerHTML = '<span class="sym">' + s + '</span><span class="ct">' + c + '</span>';
      root.appendChild(sp);
    });
  }

  function classifyAll() {
    var src = el('live-code').value;
    var lang = el('live-code').getAttribute('data-lang') || 'javascript';
    if (!window.QuantumPrefixes || !QuantumPrefixes.prefixMetadata) return;
    var meta = QuantumPrefixes.prefixMetadata(src, lang);
    renderStats(0, meta);
    renderStats(1, meta);
  }

  el('btn-classify').addEventListener('click', classifyAll);
  [el('qpu-0'), el('qpu-1')].forEach(function (x) {
    x.addEventListener('change', classifyAll);
  });

  function tiltBind(stageId, cardId) {
    var stage = document.querySelector(stageId);
    var card = el(cardId);
    if (!stage || !card) return;
    function setT(e) {
      var r = stage.getBoundingClientRect();
      var mx = (e.clientX - r.left) / Math.max(1, r.width) - 0.5;
      var my = (e.clientY - r.top) / Math.max(1, r.height) - 0.5;
      var maxR = reduced ? 8 : 20;
      card.style.transform = 'rotateX(' + (-my * maxR) + 'deg) rotateY(' + (mx * maxR) + 'deg)';
      card.classList.toggle('grid-hot', Math.abs(mx) + Math.abs(my) > 0.08);
    }
    function reset() {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
      card.classList.remove('grid-hot');
    }
    stage.addEventListener('pointermove', setT);
    stage.addEventListener('pointerleave', reset);
  }
  tiltBind('[data-slot="0"]', 'card-0');
  tiltBind('[data-slot="1"]', 'card-1');

  function rubikSpin(id) {
    var r = el(id);
    if (!r) return;
    var ang = 0;
    r.addEventListener('click', function () {
      ang += 90;
      r.style.transform = 'rotateX(' + (ang * 0.25) + 'deg) rotateY(' + ang + 'deg)';
    });
    r.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); r.click(); }
    });
  }
  rubikSpin('rubik-0');
  rubikSpin('rubik-1');

  /* --- Mini proximity grid (strip) --- */
  var mcv = el('mini-canvas');
  var mctx = mcv.getContext('2d');
  var px = 50, py = 50, tx = 50, ty = 50;
  var SP = 14, PROX = 60;
  function smoothstep(t) { return t * t * (3 - 2 * t); }
  function heatAt(x, y, mx, my) {
    var d = Math.hypot(x - mx, y - my);
    if (d >= PROX) return 0;
    return smoothstep(1 - d / PROX);
  }
  function drawMini() {
    var r = mcv.getBoundingClientRect();
    var dpr = Math.min(devicePixelRatio || 1, 2);
    var W = Math.max(80, r.width * dpr);
    var H = Math.max(80, r.height * dpr);
    if (mcv.width !== W || mcv.height !== H) {
      mcv.width = W;
      mcv.height = H;
    }
    mctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var w = r.width, h = r.height;
    if (!reduced) {
      px += (tx - px) * 0.18;
      py += (ty - py) * 0.18;
    } else { px = tx; py = ty; }
    mctx.fillStyle = '#0a0b12';
    mctx.fillRect(0, 0, w, h);
    var nx = Math.ceil(w / SP) + 2;
    var ny = Math.ceil(h / SP) + 2;
    var ox = (w - (nx - 1) * SP) / 2;
    var oy = (h - (ny - 1) * SP) / 2;
    var base = 0.1, boost = 0.5;
    var x, y, h0, a;
    for (y = 0; y < ny; y++) {
      for (x = 0; x < nx; x++) {
        h0 = heatAt(ox + x * SP, oy + y * SP, px, py);
        a = base + h0 * boost;
        mctx.strokeStyle = 'rgba(180,200,220,' + a + ')';
        mctx.lineWidth = 0.8;
        mctx.beginPath();
        mctx.moveTo(ox + x * SP - 4, oy + y * SP);
        mctx.lineTo(ox + x * SP + 4, oy + y * SP);
        mctx.moveTo(ox + x * SP, oy + y * SP - 4);
        mctx.lineTo(ox + x * SP, oy + y * SP + 4);
        mctx.stroke();
      }
    }
    requestAnimationFrame(drawMini);
  }
  mcv.addEventListener('pointermove', function (e) {
    var b = mcv.getBoundingClientRect();
    tx = e.clientX - b.left;
    ty = e.clientY - b.top;
  }, { passive: true });
  drawMini();

  classifyAll();
})();
</script>
<script>
// ===== QUANTUM PREFIX LIVE SYNC =====
(function () {
  try {
    if (window.QuantumPrefixes && QuantumPrefixes.broadcastState) {
      QuantumPrefixes.broadcastState('qpu-depth-workbench', { app: 'qpu-depth-workbench', ts: Date.now() });
    }
  } catch (e) {}
})();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function () {});
</script>
</body>
</html>
