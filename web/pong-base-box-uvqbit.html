<!-- beyondBINARY quantum-prefixed | uvspeed | {n, +1, -n, +0, 0, -1, +n, +2, -0, +3, 1} -->
<!-- Six compositing planes: 0 bg · 1 radial glow · 2 13×13 lattice · 3 pong grid · 4 lit cells · 5 gradient brackets -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Pong × Base Box · QPU planes</title>
<link rel="stylesheet" href="quantum-theme.css">
<script src="quantum-prefixes.js"></script>
<script src="qbit-dac.js"></script>
<script src="qbit-steno.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#000;-webkit-font-smoothing:antialiased}
html{font-size:16px}
.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.viewport{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px;
}
.base-shell{
  padding:2px;border-radius:18px;max-width:min(92vw,340px);width:100%;
  background:linear-gradient(135deg,rgba(110,190,255,.55),rgba(170,150,255,.48),rgba(230,200,120,.42));
  box-shadow:0 24px 64px rgba(0,0,0,.65),0 0 1px rgba(255,255,255,.12);
}
/* plane 0: matte void */
.base-inner{
  position:relative;border-radius:16px;background:#000;padding:clamp(16px,4vw,22px);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  min-height:min(72vh,360px);
}
/* plane 1: central blue atmosphere */
.plane-1-atmosphere{
  position:absolute;inset:0;border-radius:15px;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 78% 62% at 50% 44%,rgba(88,166,255,.16),rgba(40,60,120,.04) 42%,transparent 62%);
}
/* plane 2: lattice canvas (transparent clears) */
#lattice-canvas{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(100% - 8px,320px);aspect-ratio:1;max-height:min(72vh,320px);
  z-index:2;pointer-events:none;border-radius:12px;
}
/* plane 3+4: 7×7 — lit cells are plane 4 (pseudo / shadow on buttons) */
.pong-7{
  position:relative;z-index:4;
  display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,1fr);
  gap:clamp(3px,1.2vw,6px);
  width:min(64vw,236px);aspect-ratio:1;margin:0 auto;
}
.pong-7 button.cell{
  -webkit-appearance:none;appearance:none;border:none;cursor:default;padding:0;
  border-radius:28%;
  background:rgba(42,46,54,0.28);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  transition:background 40ms linear,box-shadow 40ms linear,filter 40ms linear;
}
.pong-7 button.cell[aria-pressed="true"]{
  background:#f8f8fb;
  box-shadow:0 0 18px rgba(255,255,255,.55),0 0 28px rgba(255,255,255,.22),inset 0 0 0 1px rgba(255,255,255,.35);
  filter:brightness(1.08);
}
/* plane 5: tall gradient parentheses */
.plane-5-brackets{
  position:absolute;inset:0;pointer-events:none;z-index:3;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 min(2px,0.5vw);border-radius:15px;
}
.plane-5-brackets .brk{
  font-weight:200;line-height:0.82;font-family:system-ui,-apple-system,sans-serif;
  font-size:clamp(160px,52vmin,300px);opacity:.5;user-select:none;
}
.plane-5-brackets .brk-l{
  background:linear-gradient(180deg,#9ee8ff 0%,#4530b8 95%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.plane-5-brackets .brk-r{
  background:linear-gradient(180deg,#4a2aa8 0%,#f0d080 95%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
</style>
</head>
<body>
<h1 class="visually-hidden">Pong loader with six-plane QPU stack</h1>
<div class="viewport">
  <div class="base-shell" role="img" aria-label="Pong pixel loader with layered lattice and brackets">
    <div class="base-inner">
      <div class="plane-1-atmosphere" aria-hidden="true"></div>
      <canvas id="lattice-canvas" width="512" height="512" aria-hidden="true"></canvas>
      <div class="plane-5-brackets" aria-hidden="true">
        <span class="brk brk-l">(</span>
        <span class="brk brk-r">)</span>
      </div>
      <div class="pong-7" id="pong7" aria-hidden="true"></div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  var G = 7;
  var N = 13;
  var PONG_LIVE = /[?&]pong=1(?:&|$)/.test(location.search);
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var host = document.getElementById('pong7');
  var cells = [];
  var i, r, c, b;
  for (i = 0; i < G * G; i++) {
    b = document.createElement('button');
    b.type = 'button';
    b.className = 'cell';
    b.setAttribute('aria-pressed', 'false');
    b.tabIndex = -1;
    host.appendChild(b);
    cells.push(b);
  }

  var ball = { x: 3, y: 3, vx: 0.22, vy: 0.14 };
  var p1 = 3;
  var p2 = 3;
  if (reduced) {
    ball.vx *= 0.35;
    ball.vy *= 0.35;
  }

  var topoT = 0;

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function paddleRows(pc) {
    return [pc - 1, pc, pc + 1].map(function (rw) { return clamp(rw, 0, G - 1); });
  }
  function syncGrid() {
    var lit = {};
    var pr1 = paddleRows(Math.round(p1));
    var pr2 = paddleRows(Math.round(p2));
    pr1.forEach(function (rw) { lit['0,' + rw] = 1; });
    pr2.forEach(function (rw) { lit[(G - 1) + ',' + rw] = 1; });
    var bx = clamp(Math.round(ball.x), 0, G - 1);
    var by = clamp(Math.round(ball.y), 0, G - 1);
    lit[bx + ',' + by] = 1;
    var ix = 0;
    for (r = 0; r < G; r++) {
      for (c = 0; c < G; c++) {
        cells[ix].setAttribute('aria-pressed', lit[c + ',' + r] ? 'true' : 'false');
        ix++;
      }
    }
  }

  var dotRGBA = [
    'rgba(63,185,80,0.78)',
    'rgba(255,123,100,0.78)',
    'rgba(110,170,255,0.78)',
    'rgba(235,190,50,0.78)'
  ];

  function dotColor(ci, ri) {
    return dotRGBA[(ci + ri * 2) % 4];
  }

  function cellCenter13(ci, ri, w, h) {
    var pad = 14;
    var stepX = (w - pad * 2) / (N - 1);
    var stepY = (h - pad * 2) / (N - 1);
    return { x: pad + ci * stepX, y: pad + ri * stepY };
  }

  function ballLatticeCell() {
    if (!PONG_LIVE) return null;
    var bc = clamp(Math.round((ball.x / (G - 1)) * (N - 1)), 0, N - 1);
    var br = clamp(Math.round((ball.y / (G - 1)) * (N - 1)), 0, N - 1);
    return { c: bc, r: br };
  }

  var lat = document.getElementById('lattice-canvas');
  var lctx = lat.getContext('2d');

  function drawLattice() {
    var rect = lat.getBoundingClientRect();
    var w = Math.max(1, rect.width);
    var h = Math.max(1, rect.height);
    lctx.clearRect(0, 0, w, h);

    var pulse = reduced ? 0 : Math.sin(topoT * 2.2) * 0.025;

    for (r = 0; r < N; r++) {
      for (c = 0; c < N; c++) {
        if (c < N - 1) {
          var a = cellCenter13(c, r, w, h);
          var b2 = cellCenter13(c + 1, r, w, h);
          lctx.strokeStyle = 'rgba(160,175,195,' + (0.06 + pulse) + ')';
          lctx.lineWidth = 1;
          lctx.beginPath();
          lctx.moveTo(a.x, a.y);
          lctx.lineTo(b2.x, b2.y);
          lctx.stroke();
        }
        if (r < N - 1) {
          var p0 = cellCenter13(c, r, w, h);
          var p1 = cellCenter13(c, r + 1, w, h);
          lctx.strokeStyle = 'rgba(160,175,195,' + (0.055 + pulse) + ')';
          lctx.beginPath();
          lctx.moveTo(p0.x, p0.y);
          lctx.lineTo(p1.x, p1.y);
          lctx.stroke();
        }
      }
    }

    for (r = 0; r < N; r++) {
      for (c = 0; c < N; c++) {
        var p = cellCenter13(c, r, w, h);
        var rad = 2.1;
        lctx.beginPath();
        lctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
        lctx.fillStyle = dotColor(c, r);
        lctx.fill();
      }
    }

    var hi = ballLatticeCell();
    if (hi) {
      var px = cellCenter13(hi.c, hi.r, w, h);
      var g = lctx.createRadialGradient(px.x, px.y, 0, px.x, px.y, 16);
      g.addColorStop(0, 'rgba(255,235,140,0.55)');
      g.addColorStop(0.45, 'rgba(255,200,60,0.2)');
      g.addColorStop(1, 'transparent');
      lctx.fillStyle = g;
      lctx.beginPath();
      lctx.arc(px.x, px.y, 16, 0, Math.PI * 2);
      lctx.fill();
      lctx.beginPath();
      lctx.arc(px.x, px.y, 4 + pulse * 8, 0, Math.PI * 2);
      lctx.fillStyle = 'rgba(255,245,200,0.95)';
      lctx.fill();
    }
  }

  function layoutLat() {
    var rect = lat.getBoundingClientRect();
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var bw = Math.max(128, Math.floor(rect.width * dpr));
    var bh = Math.max(128, Math.floor(rect.height * dpr));
    if (lat.width !== bw || lat.height !== bh) {
      lat.width = bw;
      lat.height = bh;
    }
    lctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function step() {
    var sp = reduced ? 0.45 : 1;
    topoT += 0.008 * sp;
    if (PONG_LIVE) {
    ball.x += ball.vx * sp;
    ball.y += ball.vy * sp;

    if (ball.y < 0.5) {
      ball.y = 0.5;
      ball.vy = Math.abs(ball.vy);
    }
    if (ball.y > G - 0.5) {
      ball.y = G - 0.5;
      ball.vy = -Math.abs(ball.vy);
    }

    p1 += (ball.y - p1) * (0.16 * sp);
    p1 = clamp(p1, 1, G - 2);
    p2 += (ball.y - p2) * (0.16 * sp);
    p2 = clamp(p2, 1, G - 2);

    var m = 0.42;
    if (ball.x < m) {
      if (Math.abs(ball.y - p1) < 1.35) {
        ball.x = m;
        ball.vx = Math.abs(ball.vx);
        ball.vy += (ball.y - p1) * 0.06;
      } else if (ball.x < -0.2) {
        ball.x = (G - 1) / 2;
        ball.y = (G - 1) / 2;
        ball.vx = (Math.random() < 0.5 ? 1 : -1) * (0.16 + Math.random() * 0.12);
        ball.vy = (Math.random() - 0.5) * 0.18;
      }
    }
    if (ball.x > G - 1 - m) {
      if (Math.abs(ball.y - p2) < 1.35) {
        ball.x = G - 1 - m;
        ball.vx = -Math.abs(ball.vx);
        ball.vy += (ball.y - p2) * 0.06;
      } else if (ball.x > G - 0.2) {
        ball.x = (G - 1) / 2;
        ball.y = (G - 1) / 2;
        ball.vx = (Math.random() < 0.5 ? 1 : -1) * (0.16 + Math.random() * 0.12);
        ball.vy = (Math.random() - 0.5) * 0.18;
      }
    }
    ball.vx = clamp(ball.vx, -0.34, 0.34);
    ball.vy = clamp(ball.vy, -0.3, 0.3);
    }

    syncGrid();
    layoutLat();
    drawLattice();
  }

  function tick() {
    step();
    if (!reduced) requestAnimationFrame(tick);
  }
  if (reduced) {
    step();
    setInterval(step, 140);
  } else requestAnimationFrame(tick);

  window.addEventListener('resize', function () {
    layoutLat();
    drawLattice();
  });
  syncGrid();
  requestAnimationFrame(function () {
    layoutLat();
    drawLattice();
  });
})();
</script>
<script>
// ===== QUANTUM PREFIX LIVE SYNC =====
(function () {
  try {
    if (window.QuantumPrefixes && QuantumPrefixes.broadcastState) {
      QuantumPrefixes.broadcastState('pong-base-box-uvqbit', { app: 'pong-base-box-uvqbit', ts: Date.now() });
    }
  } catch (e) {}
})();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function () {});
</script>
</body>
</html>
