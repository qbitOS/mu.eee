        secEl.setAttribute('data-section-key', f.value);
      } else {
        secEl.removeAttribute('data-section-key');
      }
      bandEl.textContent = '';
      bandEl.hidden = true;
      mir.hidden = secEl.hidden;
    } else {
      secEl.textContent = '';
      bandEl.textContent = '';
      secEl.hidden = true;
      bandEl.hidden = true;
      secEl.removeAttribute('data-section-key');
      mir.hidden = true;
    }
  }
  window.addEventListener('message', function (ev) {
    var d = ev && ev.data;
    if (!d || d.type !== 'mueee-search-filter-sync') return;
    applyMueeeFilterMirrorFromPayload(d);
  });
  syncPromptBarHeight();
})();</script>
</body>
</html>
