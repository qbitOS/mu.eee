<!-- beyondBINARY quantum-prefixed | uvspeed | {n, +1, -n, +0, 0, -1, +n, +2, -0, +3, 1} -->
<!-- Generated by scripts/build_mueee.py — prompt bar + iframes + footer spine (not a script-merge). App switching: footer #mueee-throughline-bar only; Go/Enter → Search via postMessage mueee-prompt. Off-screen panes use data-src + loading=lazy; Search fetchpriority=high; idle prefetch; theme sync only loaded iframes; spine ⌘/Ctrl/middle-click opens app in new tab (fast dev). -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<meta name="theme-color" content="#050810">
<title>μ'search</title>
<link rel="stylesheet" href="quantum-theme.css">
<style>
html,body{min-height:100%;height:100%;margin:0;}
#mueee-shell{min-height:100dvh;height:100%;display:flex;flex-direction:column;background:var(--qp-bg);color:var(--qp-text);}
#mueee-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:var(--mueee-title-bar-min-height);padding:0 12px;border-bottom:1px solid var(--qp-border);background:var(--qp-bg-secondary);flex-shrink:0;box-sizing:border-box;}
.mueee-topbar-main{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:1;min-width:0;box-sizing:border-box;}
.mueee-topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:1;min-width:0;}
#mueee-pane-title{margin:0;font:800 14px 'SF Mono',monospace;background:linear-gradient(135deg,#c9a84c,#56d4dd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;}
#mueee-tabs{flex:1;min-width:140px;max-width:100%;}
#mueee-prompt-form{display:flex;align-items:stretch;gap:8px;width:100%;min-width:0;}
#mueee-prompt{flex:1;min-width:0;font:600 13px monospace;padding:8px 12px;border-radius:8px;border:1px solid var(--qp-border);background:var(--qp-bg);color:var(--qp-text);}
#mueee-prompt:focus{outline:none;border-color:var(--qp-accent);box-shadow:0 0 0 2px rgba(124,58,237,0.15);}
#mueee-prompt::placeholder{color:var(--qp-text-muted);opacity:.85;}
#mueee-prompt-go{font:600 11px monospace;padding:8px 14px;border-radius:8px;border:1px solid var(--qp-border);background:var(--qp-bg-tertiary);color:var(--qp-accent);cursor:pointer;flex-shrink:0;}
#mueee-prompt-go:hover{border-color:var(--qp-accent);background:var(--qp-bg-hover);}
#mueee-theme-toggle{flex-shrink:0;width:40px;height:40px;padding:0;border-radius:50%;border:1px solid var(--qp-border);background:var(--qp-bg-tertiary);color:var(--qp-text);font-size:18px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s,box-shadow .15s;}
#mueee-theme-toggle:hover{border-color:var(--qp-accent);background:var(--qp-bg-hover);}
#mueee-theme-toggle:focus-visible{outline:2px solid var(--qp-accent);outline-offset:2px;}
#mueee-spine-hint{font:500 9px monospace;color:var(--qp-text-muted);opacity:.85;max-width:min(200px,28vw);line-height:1.25;text-align:right;}
@media(max-width:720px){#mueee-spine-hint{display:none;}}
#mueee-rainbow{display:flex;width:100%;flex-shrink:0;height:var(--mueee-rainbow-height);min-height:var(--mueee-rainbow-height);max-height:var(--mueee-rainbow-height);}
#mueee-rainbow span{flex:1;min-height:var(--mueee-rainbow-height);transition:background-color .2s ease;}
.mueee-frame-wrap{flex:1;min-height:0;position:relative;}
.mueee-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--qp-bg);display:none;}
.mueee-frame-wrap iframe.on{display:block;}
#mueee-throughline-wrap{display:flex;align-items:center;gap:10px;padding:6px 12px;border-top:1px solid var(--qp-border);background:var(--qp-bg-tertiary);flex-shrink:0;flex-wrap:wrap;}
.mueee-tl-label{font:600 9px monospace;color:var(--qp-text-muted);letter-spacing:.12em;text-transform:uppercase;flex-shrink:0;}
#mueee-throughline-bar{display:flex;flex-wrap:wrap;align-items:center;gap:4px;flex:1;min-width:0;}
.mueee-tl-step{font:600 10px monospace;padding:4px 8px;border-radius:4px;border:1px solid var(--qp-border);background:var(--qp-bg);color:var(--qp-text-muted);cursor:pointer;}
.mueee-tl-step.on{color:var(--qp-accent);border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.08);}
.mueee-tl-conn{color:var(--qp-text-muted);font-size:9px;opacity:.7;padding:0 1px;}
.mueee-tl-loop{margin-left:6px;font:600 10px monospace;padding:4px 10px;border-radius:4px;border:1px dashed var(--qp-border);background:transparent;color:var(--qp-accent);cursor:pointer;}
.mueee-tl-loop:hover{border-color:var(--qp-accent);}
</style>
</head>
<body>
<div id="mueee-shell">
  <header id="mueee-topbar">
    <div class="mueee-topbar-main">
      <div class="mueee-topbar-left">
        <span id="mueee-pane-title" class="mueee-pane-title" aria-live="polite" title="Current app">μ'search</span>
        <nav id="mueee-tabs" aria-label="Search and prompt">
          <form id="mueee-prompt-form" class="mueee-prompt-form" action="#" autocomplete="off">
            <input type="search" id="mueee-prompt" name="q" enterkeyhint="search" placeholder="Search or prompt… (sends to Search)" title="Universal prompt — Go runs Search in the pane below">
            <button type="submit" id="mueee-prompt-go">Go</button>
          </form>
        </nav>
      </div>
    </div>
    <span id="mueee-spine-hint" title="Avoid nested iframe reload cost while editing">Spine: ⌘/Ctrl+click = new tab</span>
    <button type="button" id="mueee-theme-toggle" aria-label="Toggle light or dark theme" title="Theme">&#x263E;</button>
  </header>
  <div id="mueee-rainbow" class="mueee-rainbow" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="mueee-frame-wrap" aria-live="polite">
    <iframe id="mueee-frame-search" class="on" title="Search" src="search.html" fetchpriority="high"></iframe>
    <iframe id="mueee-frame-history" title="History" loading="lazy" data-src="history.html"></iframe>
    <iframe id="mueee-frame-pad" title="GridPad" loading="lazy" data-src="pad-datatable.html"></iframe>
    <iframe id="mueee-frame-kbatch" title="Kbatch" loading="lazy" data-src="kbatch.html"></iframe>
    <iframe id="mueee-frame-hexcast" title="Hexcast" loading="lazy" data-src="hexcast.html"></iframe>
    <iframe id="mueee-frame-jawta" title="Jawta — spatial audio &amp; music bridge" loading="lazy" data-src="jawta-audio.html"></iframe>
    <iframe id="mueee-frame-research" title="Research Lab — lyrics, credits, markdown export" loading="lazy" data-src="research-lab.html"></iframe>
    <iframe id="mueee-frame-throughline" title="Throughline Lab" loading="lazy" data-src="throughline-lab.html"></iframe>
    <iframe id="mueee-frame-games" title="μgrad game hub" loading="lazy" data-src="games-ugrad-hub.html"></iframe>
    <iframe id="mueee-frame-brothernumsy" title="Brother Numsy — beyondBINARY runner" loading="lazy" data-src="brothernumsy.html"></iframe>
    <iframe id="mueee-frame-globe" title="QPU — map &amp; throughline" loading="lazy" data-src="qbit-globe.html"></iframe>
    <iframe id="mueee-frame-uvqbit" title="uvQbit — quantum IDE" loading="lazy" data-src="uvqbit.html"></iframe>
    <iframe id="mueee-frame-corerace" title="Core Race" loading="lazy" data-src="qbit-core-race.html"></iframe>
    <iframe id="mueee-frame-gridlock" title="Gridlock — mapping hub" loading="lazy" data-src="gridlock.html"></iframe>
    <iframe id="mueee-frame-notes" title="Notes — iterative surface" loading="lazy" data-src="notes.html"></iframe>
  </div>
  <footer id="mueee-throughline-wrap" class="mueee-throughline-wrap" aria-label="Tonnetz throughline spine">
    <span class="mueee-tl-label">Spine</span>
    <div id="mueee-throughline-bar" class="mueee-throughline-bar"></div>
  </footer>
</div>
<script src="mueee-throughline-spine.js"></script>
<script>
(function () {
  'use strict';
  var themeBtn = document.getElementById('mueee-theme-toggle');
  var promptForm = document.getElementById('mueee-prompt-form');
  var promptInput = document.getElementById('mueee-prompt');
  var frames = {
    search: document.getElementById('mueee-frame-search'),
    history: document.getElementById('mueee-frame-history'),
    pad: document.getElementById('mueee-frame-pad'),
    kbatch: document.getElementById('mueee-frame-kbatch'),
    hexcast: document.getElementById('mueee-frame-hexcast'),
    jawta: document.getElementById('mueee-frame-jawta'),
    research: document.getElementById('mueee-frame-research'),
    throughline: document.getElementById('mueee-frame-throughline'),
    games: document.getElementById('mueee-frame-games'),
    brothernumsy: document.getElementById('mueee-frame-brothernumsy'),
    globe: document.getElementById('mueee-frame-globe'),
    uvqbit: document.getElementById('mueee-frame-uvqbit'),
    corerace: document.getElementById('mueee-frame-corerace'),
    gridlock: document.getElementById('mueee-frame-gridlock'),
    notes: document.getElementById('mueee-frame-notes')
  };
  var rainbowEl = document.getElementById('mueee-rainbow');
  var RAINBOW_BY_PANE = {
    search: ['#7c3aed', '#06b6d4', '#a78bfa', '#22d3ee', '#8b5cf6', '#34d399'],
    history: ['#7c3aed', '#06b6d4', '#a78bfa', '#22d3ee', '#8b5cf6', '#34d399'],
    pad: ['#a78bfa', '#22d3ee', '#34d399', '#7c3aed', '#475569', '#94a3b8'],
    kbatch: ['#c9a84c', '#56d4dd', '#58a6ff', '#a78bfa', '#34d399', '#64748b'],
    hexcast: ['#f0883e', '#58a6ff', '#a78bfa', '#34d399', '#e040fb', '#22d3ee'],
    jawta: ['#22c55e', '#14b8a6', '#a78bfa', '#f472b6', '#34d399', '#64748b'],
    research: ['#3fb950', '#58a6ff', '#a78bfa', '#c9a84c', '#22d3ee', '#64748b'],
    throughline: ['#56d4dd', '#c9a84c', '#58a6ff', '#a78bfa', '#3fb950', '#64748b'],
    games: ['#58a6ff', '#a78bfa', '#34d399', '#f0883e', '#e040fb', '#22d3ee'],
    brothernumsy: ['#e040fb', '#a78bfa', '#58a6ff', '#f0883e', '#34d399', '#22d3ee'],
    globe: ['#ff3838', '#ff8c38', '#ffe138', '#3fb950', '#38a5ff', '#bc8cff'],
    uvqbit: ['#58a6ff', '#a78bfa', '#3fb950', '#c9a84c', '#bc8cff', '#f0883e'],
    corerace: ['#f85149', '#58a6ff', '#3fb950', '#c9a84c', '#bc8cff', '#d29922'],
    gridlock: ['#c9a84c', '#56d4dd', '#58a6ff', '#a78bfa', '#34d399', '#64748b'],
    notes: ['#c9a84c', '#58a6ff', '#3fb950', '#a78bfa', '#22d3ee', '#f0883e']
  };
  var MUEEE_TITLE_BY_PANE = {
    search: "μ'search",
    history: "μ'history",
    pad: "μ'gridpad",
    kbatch: "μ'kbatch",
    hexcast: "μ'hexcast",
    jawta: "μ'jawta",
    research: "μ'research",
    throughline: "μ'throughline",
    games: "μ'games",
    brothernumsy: "μ'brothernumsy",
    globe: "μ'qpu",
    uvqbit: "μ'uvqbit",
    corerace: "μ'corerace",
    gridlock: "μ'gridlock",
    notes: "μ'notes"
  };
  var PANE_URL = {
    search: 'search.html',
    history: 'history.html',
    pad: 'pad-datatable.html',
    kbatch: 'kbatch.html',
    hexcast: 'hexcast.html',
    jawta: 'jawta-audio.html',
    research: 'research-lab.html',
    throughline: 'throughline-lab.html',
    games: 'games-ugrad-hub.html',
    brothernumsy: 'brothernumsy.html',
    globe: 'qbit-globe.html',
    uvqbit: 'uvqbit.html',
    corerace: 'qbit-core-race.html',
    gridlock: 'gridlock.html',
    notes: 'notes.html'
  };
  function iframeLoaded(el) {
    if (!el) return false;
    if (el.dataset.mueeeLoaded === '1') return true;
    return !!el.getAttribute('src');
  }
  var paneTitleEl = document.getElementById('mueee-pane-title');
  function setMueeePaneTitle(pane) {
    var mu = MUEEE_TITLE_BY_PANE[pane] || MUEEE_TITLE_BY_PANE.search;
    document.title = mu;
    if (paneTitleEl) paneTitleEl.textContent = mu;
  }
  function setMueeeRainbow(pane) {
    if (!rainbowEl) return;
    var colors = RAINBOW_BY_PANE[pane] || RAINBOW_BY_PANE.search;
    var spans = rainbowEl.querySelectorAll('span');
    for (var i = 0; i < spans.length; i++) {
      spans[i].style.backgroundColor = colors[i] || colors[colors.length - 1];
    }
  }
  function ensurePaneLoaded(pane) {
    var el = frames[pane];
    if (!el) return;
    var u = el.getAttribute('data-src');
    if (!u || el.dataset.mueeeLoaded === '1') return;
    el.src = u;
    el.dataset.mueeeLoaded = '1';
  }
  function syncIframes(theme) {
    Object.keys(frames).forEach(function (k) {
      var el = frames[k];
      if (!iframeLoaded(el)) return;
      try {
        el.contentWindow.postMessage({ type: 'upl-sync-theme', theme: theme }, '*');
      } catch (e) {}
    });
  }
  function applyMueeeTheme(isLight) {
    document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = isLight ? '#f8fafc' : '#050810';
    if (themeBtn) themeBtn.textContent = isLight ? '\u2600' : '\u263E';
    localStorage.setItem('mueee-theme', isLight ? 'light' : 'dark');
    syncIframes(isLight ? 'light' : 'dark');
  }
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      applyMueeeTheme(document.documentElement.getAttribute('data-theme') !== 'light');
    });
  }
  Object.keys(frames).forEach(function (k) {
    frames[k].addEventListener('load', function () {
      var t = localStorage.getItem('mueee-theme') === 'light' ? 'light' : 'dark';
      try {
        frames[k].contentWindow.postMessage({ type: 'upl-sync-theme', theme: t }, '*');
      } catch (e) {}
    });
  });
  function scheduleIdlePrefetch() {
    var urls = ['history.html', 'notes.html', 'kbatch.html', 'gridlock.html', 'throughline-lab.html'];
    var go = function () {
      urls.forEach(function (u) {
        var link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = u;
        document.head.appendChild(link);
      });
    };
    if (window.requestIdleCallback) window.requestIdleCallback(go, { timeout: 5000 });
    else setTimeout(go, 1800);
  }
  scheduleIdlePrefetch();
  applyMueeeTheme(localStorage.getItem('mueee-theme') === 'light');
  try {
    var _draft = localStorage.getItem('mueee-prompt-draft');
    if (_draft && promptInput) promptInput.value = _draft;
  } catch (eDraft) {}
  function sendPromptToSearch(q) {
    var fr = frames.search;
    if (!fr || !fr.contentWindow) return;
    try {
      fr.contentWindow.postMessage({ type: 'mueee-prompt', query: q, source: 'mueee-shell' }, '*');
    } catch (e) {}
  }
  if (promptForm && promptInput) {
    promptForm.addEventListener('submit', function (e) {
      e.preventDefault();
      var q = (promptInput.value || '').trim();
      if (!q) {
        promptInput.focus();
        return;
      }
      try { localStorage.setItem('mueee-prompt-draft', q); } catch (e2) {}
      activatePane('search');
      function fire() {
        sendPromptToSearch(q);
      }
      setTimeout(fire, 0);
    });
  }
  function activatePane(pane) {
    ensurePaneLoaded(pane);
    setMueeeRainbow(pane);
    setMueeePaneTitle(pane);
    Object.keys(frames).forEach(function (k) {
      frames[k].classList.toggle('on', k === pane);
    });
    try {
      if (frames[pane] && frames[pane].contentWindow) {
        frames[pane].contentWindow.dispatchEvent(new Event('resize'));
        requestAnimationFrame(function () {
          try {
            frames[pane].contentWindow.dispatchEvent(new Event('resize'));
          } catch (eR) {}
        });
      }
    } catch (e) {}
    try {
      if (window.MueeeThroughlineSpine) MueeeThroughlineSpine.setActivePane(pane, frames);
    } catch (e2) {}
  }
  window.mueeeActivatePane = activatePane;
  if (window.MueeeThroughlineSpine) {
    MueeeThroughlineSpine.init({
      wrapId: 'mueee-throughline-wrap',
      switchToPane: function (p) {
        if (window.mueeeActivatePane) window.mueeeActivatePane(p);
      }
    });
  }
  (function bindSpineNewTab() {
    var wrap = document.getElementById('mueee-throughline-wrap');
    if (!wrap) return;
    function openPaneUrl(pane) {
      var url = PANE_URL[pane];
      if (url) window.open(url, '_blank', 'noopener');
    }
    wrap.addEventListener(
      'click',
      function (e) {
        var step = e.target.closest('.mueee-tl-step');
        if (!step || !step.dataset.pane) return;
        if (e.ctrlKey || e.metaKey || e.shiftKey) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPaneUrl(step.dataset.pane);
        }
      },
      true
    );
    wrap.addEventListener(
      'auxclick',
      function (e) {
        if (e.button !== 1) return;
        var step = e.target.closest('.mueee-tl-step');
        if (!step || !step.dataset.pane) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        openPaneUrl(step.dataset.pane);
      },
      true
    );
    wrap.addEventListener(
      'click',
      function (e) {
        if (!e.target.closest('.mueee-tl-loop')) return;
        if (e.ctrlKey || e.metaKey || e.shiftKey) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPaneUrl('search');
        }
      },
      true
    );
  })();
  activatePane('search');
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function () {});
})();
</script>
</body>
</html>
