  function sendPromptToSearch(q) {
    var fr = frames.search;
    if (!fr || !fr.contentWindow) return;
    try {
      fr.contentWindow.postMessage({ type: 'mueee-prompt', query: q, source: 'mueee-shell' }, '*');
    } catch (e) {}
  }
  if (promptForm && promptInput) {
    promptForm.addEventListener('submit', function (e) {
      e.preventDefault();
      var q = (promptInput.value || '').trim();
      if (!q) {
        promptInput.focus();
        return;
      }
      try { localStorage.setItem('mueee-prompt-draft', q); } catch (e2) {}
      activatePane('search');
      function fire() {
        sendPromptToSearch(q);
      }
      setTimeout(fire, 0);
    });
  }
  function activatePane(pane) {
    ensurePaneLoaded(pane);
    setMueeeRainbow(pane);
    setMueeePaneTitle(pane);
    Object.keys(frames).forEach(function (k) {
      frames[k].classList.toggle('on', k === pane);
    });
    try {
      if (frames[pane] && frames[pane].contentWindow) {
        frames[pane].contentWindow.dispatchEvent(new Event('resize'));
        requestAnimationFrame(function () {
          try {
            frames[pane].contentWindow.dispatchEvent(new Event('resize'));
          } catch (eR) {}
        });
      }
    } catch (e) {}
    try {
      if (window.MueeeThroughlineSpine) MueeeThroughlineSpine.setActivePane(pane, frames);
    } catch (e2) {}
    var sd = document.getElementById('mueee-spine-dock');
    if (sd) {
      sd.classList.remove('mueee-spine-collapsed');
      try {
        clearTimeout(window.__mueeeSpineIdleT);
        window.__mueeeSpineIdleT = setTimeout(function () {
          if (sd && !sd.matches(':hover')) sd.classList.add('mueee-spine-collapsed');
        }, 8000);
      } catch (eSD) {}
    }
  }
  window.mueeeActivatePane = activatePane;
  (function spineAutoHide() {
    var dock = document.getElementById('mueee-spine-dock');
    if (!dock) return;
    function arm() {
      try {
        clearTimeout(window.__mueeeSpineIdleT);
        window.__mueeeSpineIdleT = setTimeout(function () {
          if (dock && !dock.matches(':hover')) dock.classList.add('mueee-spine-collapsed');
        }, 8000);
      } catch (e) {}
    }
    dock.addEventListener('mouseenter', function () {
      dock.classList.remove('mueee-spine-collapsed');
      try { clearTimeout(window.__mueeeSpineIdleT); } catch (e2) {}
    });
    dock.addEventListener('mouseleave', arm);
    dock.addEventListener('click', function () { dock.classList.remove('mueee-spine-collapsed'); });
    arm();
  })();
  if (window.MueeeThroughlineSpine) {
    MueeeThroughlineSpine.init({
      wrapId: 'mueee-throughline-wrap',
      switchToPane: function (p) {
        if (window.mueeeActivatePane) window.mueeeActivatePane(p);
      }
    });
  }
  (function bindSpineNewTab() {
    var wrap = document.getElementById('mueee-throughline-wrap');
    if (!wrap) return;
    function openPaneUrl(pane) {
      var url = PANE_URL[pane];
      if (url) window.open(url, '_blank', 'noopener');
    }
    wrap.addEventListener(
      'click',
      function (e) {
        var step = e.target.closest('.mueee-tl-step');
        if (!step || !step.dataset.pane) return;
        if (e.ctrlKey || e.metaKey || e.shiftKey) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPaneUrl(step.dataset.pane);
        }
      },
      true
    );
    wrap.addEventListener(
      'auxclick',
      function (e) {
        if (e.button !== 1) return;
        var step = e.target.closest('.mueee-tl-step');
        if (!step || !step.dataset.pane) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        openPaneUrl(step.dataset.pane);
      },
      true
    );
    wrap.addEventListener(
      'click',
      function (e) {
        if (!e.target.closest('.mueee-tl-loop')) return;
        if (e.ctrlKey || e.metaKey || e.shiftKey) {
          e.preventDefault();
          e.stopImmediatePropagation();
          openPaneUrl('search');
        }
      },
      true
    );
  })();
  activatePane('search');
  if ('serviceWorker' in navigator && !window.__MUEEE_PANE_BASE__) navigator.serviceWorker.register('sw.js').catch(function () {});
})();
</script>
